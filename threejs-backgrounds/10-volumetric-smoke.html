<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volumetric Smoke — Three.js Hero Background</title>

  <!--
    IMPORT MAP
    Three.js r158 + simplex-noise v4 (ES module build).
    simplex-noise drives the slow organic drift of every smoke puff.
  -->
  <script type="importmap">
    {
      "imports": {
        "three":         "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/",
        "simplex-noise": "https://cdn.jsdelivr.net/npm/simplex-noise@4.0.1/dist/esm/simplex-noise.js"
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000000;     /* pure black so the smoke reads as luminous */
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      display: block;
    }

    /* ── Overlay heading ────────────────────────────────────────── */
    .overlay {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
      padding: 2rem;
      text-align: center;
      pointer-events: none;     /* mouse passes through to the canvas */
      color: #ffffff;
    }

    .overlay h1 {
      font-size: clamp(2.8rem, 8.5vw, 6.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      /* Atmospheric glow */
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
    }

    .overlay p {
      font-size: clamp(0.75rem, 1.8vw, 1rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    /* ── Palette switch buttons (top-right) ─────────────────────── */
    .palette {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      z-index: 10;
      display: flex;
      gap: 0.5rem;
    }
    .palette button {
      padding: 0.45rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 1.5rem;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(6px);
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .palette button:hover,
    .palette button.active {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.6);
      color: #ffffff;
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <!-- Palette switcher -->
  <div class="palette">
    <button data-palette="dark" class="active">Dark</button>
    <button data-palette="purple">Purple</button>
    <button data-palette="inferno">Inferno</button>
  </div>

  <div class="overlay">
    <h1>Volumetric Smoke</h1>
    <p>Three.js Hero Background — Effect 10</p>
  </div>

  <script type="module">
    import * as THREE        from 'three';
    import { createNoise3D } from 'simplex-noise';

    // ═════════════════════════════════════════════════════════════════
    //  CONFIG  — customise the effect here
    // ═════════════════════════════════════════════════════════════════
    const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)
                  || window.innerWidth < 768;

    // CHANGE PARTICLE COUNT HERE. Split across 3 depth layers below.
    const TOTAL_PARTICLES = isMobile ? 80 : 180;

    // CHANGE DRIFT / WIND STRENGTH HERE.
    const TIME_STEP    = 0.0008;  // global clock speed — lower = dreamier
    const WIND_STRENGTH = { x: 0.3, y: 0.1 };

    // ── Colour palettes ─────────────────────────────────────────────
    //  Each palette defines the weighted smoke colours plus the 3 glow
    //  light colours. ADD / EDIT PALETTES HERE.
    const PALETTES = {
      dark: {
        // [colour, weight] — weights are relative, normalised at pick time
        smoke:  [['#1a1a2e', 0.8], ['#2d1b4e', 0.1], ['#0d1f2d', 0.1]],
        lights: ['#3b0764', '#0c4a6e', '#450a0a'],
      },
      purple: {
        smoke:  [['#2d1b69', 0.8], ['#3b0764', 0.1], ['#1e1b4b', 0.1]],
        lights: ['#6b21a8', '#7c3aed', '#4c1d95'],
      },
      inferno: {
        smoke:  [['#1c0a00', 0.8], ['#2b1100', 0.1], ['#1a0500', 0.1]],
        lights: ['#7c2d12', '#b45309', '#7f1d1d'],
      },
    };
    let currentPalette = 'dark';

    // ═════════════════════════════════════════════════════════════════
    //  RENDERER / SCENE / CAMERA
    // ═════════════════════════════════════════════════════════════════
    const canvas   = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene  = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      75, window.innerWidth / window.innerHeight, 0.1, 100
    );
    camera.position.set(0, 0, 8);
    camera.lookAt(0, 0, 0);

    const noise3D = createNoise3D();

    // ═════════════════════════════════════════════════════════════════
    //  SMOKE TEXTURE  — soft wispy puff drawn on an offscreen canvas
    //
    //  We stack several radial gradients at random offsets so the puff
    //  isn't a perfect circle — that irregularity is what sells "smoke"
    //  rather than "fuzzy ball". Built once and shared by all particles.
    // ═════════════════════════════════════════════════════════════════
    function makeSmokeTexture() {
      const size = 128;
      const c    = document.createElement('canvas');
      c.width = c.height = size;
      const ctx  = c.getContext('2d');

      ctx.clearRect(0, 0, size, size);

      // Helper: one soft radial blob
      function blob(cx, cy, r) {
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        g.addColorStop(0.0, 'rgba(255,255,255,1.0)');
        g.addColorStop(0.4, 'rgba(255,255,255,0.3)');
        g.addColorStop(1.0, 'rgba(0,0,0,0.0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
      }

      const mid = size / 2;
      // Main central puff
      blob(mid, mid, mid * 0.9);
      // 4-5 smaller offset puffs to break up the silhouette
      for (let i = 0; i < 5; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist  = Math.random() * mid * 0.4;
        blob(
          mid + Math.cos(angle) * dist,
          mid + Math.sin(angle) * dist,
          mid * (0.3 + Math.random() * 0.4)
        );
      }

      const tex = new THREE.CanvasTexture(c);
      tex.needsUpdate = true;
      return tex;
    }
    const smokeTexture = makeSmokeTexture();

    // ═════════════════════════════════════════════════════════════════
    //  PALETTE HELPERS
    // ═════════════════════════════════════════════════════════════════
    function pickWeightedColor(weighted) {
      const total = weighted.reduce((s, [, w]) => s + w, 0);
      let r = Math.random() * total;
      for (const [hex, w] of weighted) {
        if ((r -= w) <= 0) return new THREE.Color(hex);
      }
      return new THREE.Color(weighted[0][0]);
    }

    // ═════════════════════════════════════════════════════════════════
    //  BUILD SMOKE PARTICLES across 3 depth layers
    //
    //  Layer split (scaled to TOTAL_PARTICLES):
    //    Layer 1 ground fog  ≈ 44%   low, wide, resists wind
    //    Layer 2 mid smoke   ≈ 33%
    //    Layer 3 high wisps  ≈ 22%   light, reacts most to wind
    // ═════════════════════════════════════════════════════════════════
    const particles = [];

    const layerCounts = [
      Math.round(TOTAL_PARTICLES * 0.44), // layer 1
      Math.round(TOTAL_PARTICLES * 0.33), // layer 2
      0,                                   // layer 3 = remainder
    ];
    layerCounts[2] = TOTAL_PARTICLES - layerCounts[0] - layerCounts[1];

    // Per-layer spawn ranges: [xMin,xMax, yMin,yMax, zMin,zMax]
    const layerRanges = {
      1: [-10, 10, -3,   -0.5, -5, 2],
      2: [ -8,  8, -0.5,  2.5, -6, 1],
      3: [ -6,  6,  2.5,  5,   -7, 0],
    };

    function rand(min, max) { return min + Math.random() * (max - min); }

    function spawnParticle(layer) {
      const [xMin, xMax, yMin, yMax, zMin, zMax] = layerRanges[layer];

      const size = rand(2.5, 6.0);
      const geo  = new THREE.PlaneGeometry(size, size);

      const maxOpacity = rand(0.025, 0.08);
      const mat = new THREE.MeshBasicMaterial({
        map:         smokeTexture,
        transparent: true,
        opacity:     maxOpacity,
        depthWrite:  false,                 // CRITICAL: stops z-fighting between planes
        blending:    THREE.NormalBlending,
        side:        THREE.DoubleSide,
        color:       pickWeightedColor(PALETTES[currentPalette].smoke),
      });

      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(rand(xMin, xMax), rand(yMin, yMax), rand(zMin, zMax));

      // Drift direction with an upward (positive-y) bias
      const dir = new THREE.Vector3(
        rand(-1, 1),
        rand(0.3, 1),          // mostly upward
        rand(-1, 1)
      ).normalize();

      mesh.userData = {
        originalPosition: mesh.position.clone(),
        driftSpeed:       rand(0.08, 0.22),
        driftDirection:   dir,
        rotationSpeed:    rand(-0.0015, 0.0015),
        noiseOffset:      rand(0, 1000),
        layer:            layer,
        maxOpacity:       maxOpacity,
        // Opacity lifecycle: fade in → hold → fade out → recycle
        life:             Math.random(),         // start mid-cycle so no synced pop
        lifeSpeed:        rand(0.0008, 0.002),
      };

      mesh.rotation.z = Math.random() * Math.PI * 2;
      scene.add(mesh);
      particles.push(mesh);
    }

    [1, 2, 3].forEach(layer => {
      for (let i = 0; i < layerCounts[layer - 1]; i++) spawnParticle(layer);
    });

    // ═════════════════════════════════════════════════════════════════
    //  ATMOSPHERIC GLOW  — light "bloom" planes behind the smoke
    //
    //  MeshBasicMaterial ignores real lights, so instead of PointLights
    //  we place additive-blended gradient planes at the light positions.
    //  They glow through the layered smoke for moody coloured depth.
    // ═════════════════════════════════════════════════════════════════
    function makeGlowTexture() {
      const size = 128;
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
      g.addColorStop(0, 'rgba(255,255,255,1)');
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, size, size);
      return new THREE.CanvasTexture(c);
    }
    const glowTexture = makeGlowTexture();

    const glowConfigs = [
      { pos: [-4, -1, 3], size: 6 },
      { pos: [ 4,  1, 2], size: 6 },
      { pos: [ 0,  3, 1], size: 5 },
    ];
    const glowPlanes = glowConfigs.map((cfg, i) => {
      const mesh = new THREE.Mesh(
        new THREE.PlaneGeometry(cfg.size, cfg.size),
        new THREE.MeshBasicMaterial({
          map:         glowTexture,
          transparent: true,
          opacity:     0.15,
          depthWrite:  false,
          blending:    THREE.AdditiveBlending,
          color:       new THREE.Color(PALETTES[currentPalette].lights[i]),
        })
      );
      mesh.position.set(...cfg.pos);
      mesh.renderOrder = -1; // render behind smoke
      scene.add(mesh);
      return mesh;
    });

    // ═════════════════════════════════════════════════════════════════
    //  MOUSE WIND
    // ═════════════════════════════════════════════════════════════════
    const mouse     = { x: 0, y: 0 };
    const windForce = { x: 0, y: 0 };
    window.addEventListener('mousemove', (e) => {
      mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });
    window.addEventListener('touchmove', (e) => {
      if (!e.touches[0]) return;
      mouse.x =  (e.touches[0].clientX / window.innerWidth)  * 2 - 1;
      mouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
    }, { passive: true });

    // Per-layer wind responsiveness: ground fog resists, wisps react most.
    const WIND_FACTOR = { 1: 0.4, 2: 0.7, 3: 1.0 };

    // ═════════════════════════════════════════════════════════════════
    //  PALETTE SWITCHING  (tween colours over ~1.5 s)
    // ═════════════════════════════════════════════════════════════════
    let paletteTween = null; // { from, to, t } per particle handled inline

    function switchPalette(name) {
      if (!PALETTES[name] || name === currentPalette) return;
      currentPalette = name;

      // Assign each particle a fresh target colour from the new palette.
      particles.forEach(p => {
        p.userData.colorFrom = p.material.color.clone();
        p.userData.colorTo   = pickWeightedColor(PALETTES[name].smoke);
        p.userData.colorT    = 0;
      });
      // Glow planes too
      glowPlanes.forEach((g, i) => {
        g.userData.colorFrom = g.material.color.clone();
        g.userData.colorTo   = new THREE.Color(PALETTES[name].lights[i]);
        g.userData.colorT    = 0;
      });
      paletteTween = true;

      // Update button active state
      document.querySelectorAll('.palette button').forEach(b =>
        b.classList.toggle('active', b.dataset.palette === name));
    }

    document.querySelectorAll('.palette button').forEach(btn => {
      btn.addEventListener('click', () => switchPalette(btn.dataset.palette));
    });

    // ═════════════════════════════════════════════════════════════════
    //  RESIZE
    // ═════════════════════════════════════════════════════════════════
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ═════════════════════════════════════════════════════════════════
    //  ANIMATION LOOP
    // ═════════════════════════════════════════════════════════════════
    let time  = 0;
    let frame = 0;
    const COLOR_TWEEN_SPEED = 1 / 90; // ~1.5 s at 60fps

    function animate() {
      requestAnimationFrame(animate);
      time += TIME_STEP;
      frame++;

      // ── Smooth the mouse wind ───────────────────────────────────
      windForce.x += (mouse.x * WIND_STRENGTH.x - windForce.x) * 0.02;
      windForce.y += (mouse.y * WIND_STRENGTH.y - windForce.y) * 0.02;

      // On mobile, update only half the particles each frame (alternating)
      // to halve noise cost.
      const stride = isMobile ? 2 : 1;
      const phase  = isMobile ? (frame % 2) : 0;

      for (let i = 0; i < particles.length; i++) {
        const p  = particles[i];
        const ud = p.userData;

        // Mobile: skip the heavy noise math on alternate particles/frames,
        // but still billboard + apply opacity every frame.
        const doNoise = (stride === 1) || (i % 2 === phase);

        if (doNoise) {
          // ── NOISE-DRIVEN DRIFT ──────────────────────────────────
          const nX = noise3D(ud.noiseOffset,        time * 0.4, 0) * 0.6;
          const nY = noise3D(ud.noiseOffset + 100,  time * 0.3, 0) * 0.3;
          const nZ = noise3D(ud.noiseOffset + 200,  time * 0.35, 0) * 0.4;

          p.position.x += (nX - p.position.x * 0.001) * ud.driftSpeed * 0.02;
          p.position.y += (0.0015 + nY * 0.001) * ud.driftSpeed;   // always rise
          p.position.z += nZ * 0.008;
          p.rotation.z += ud.rotationSpeed;

          // ── WIND (per-layer responsiveness) ─────────────────────
          const wf = WIND_FACTOR[ud.layer];
          p.position.x += windForce.x * wf * 0.01;
          p.position.y += windForce.y * wf * 0.01;
        }

        // ── OPACITY LIFECYCLE: sin(life*PI) fade in→hold→out ───────
        ud.life += ud.lifeSpeed;
        if (ud.life >= 1) ud.life = 0;          // recycle the fade cycle
        p.material.opacity = Math.sin(ud.life * Math.PI) * ud.maxOpacity;

        // ── RECYCLE when it drifts too high ────────────────────────
        if (p.position.y > 7) {
          const [xMin, xMax] = layerRanges[ud.layer];
          p.position.y = -3 + Math.random();          // back to the bottom
          p.position.x = rand(xMin, xMax);
          ud.life      = 0;                            // fade back in from 0
        }

        // ── PALETTE COLOUR TWEEN ───────────────────────────────────
        if (ud.colorTo && ud.colorT < 1) {
          ud.colorT = Math.min(1, ud.colorT + COLOR_TWEEN_SPEED);
          p.material.color.copy(ud.colorFrom).lerp(ud.colorTo, ud.colorT);
          if (ud.colorT >= 1) ud.colorTo = null;
        }

        // ── BILLBOARD: always face the camera ──────────────────────
        //  Done after moving so the plane faces the camera this frame.
        p.lookAt(camera.position);
      }

      // ── Glow plane colour tween + billboard ───────────────────────
      glowPlanes.forEach(g => {
        if (g.userData.colorTo && g.userData.colorT < 1) {
          g.userData.colorT = Math.min(1, g.userData.colorT + COLOR_TWEEN_SPEED);
          g.material.color.copy(g.userData.colorFrom).lerp(g.userData.colorTo, g.userData.colorT);
          if (g.userData.colorT >= 1) g.userData.colorTo = null;
        }
        g.lookAt(camera.position);
      });

      // ── DEPTH SORTING ────────────────────────────────────────────
      //  Transparent planes blend correctly only when drawn far→near.
      //  renderOrder by camera distance enforces that ordering.
      //  On mobile we only re-sort every 5th frame to save CPU.
      if (!isMobile || frame % 5 === 0) {
        for (let i = 0; i < particles.length; i++) {
          const d = particles[i].position.distanceTo(camera.position);
          particles[i].renderOrder = Math.floor(d * 10);
        }
      }

      // ── Slow camera drift makes static smoke feel alive ───────────
      camera.position.x = Math.sin(time * 0.15) * 0.4;
      camera.position.y = Math.cos(time * 0.12) * 0.2;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
