<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Black Hole — Three.js Hero Background (Effect 07)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: "Helvetica Neue", Arial, sans-serif;
  }

  html { background: #000000; }
  body { background: transparent; }

  #bg-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    display: block;
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js"
  }
}
</script>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <a href="#" onclick="document.querySelector('pre') && document.querySelector('pre').style.display === 'none' ? document.querySelector('pre').style.display = 'block' : null; return false;" style="
    position: fixed;
    top: 18px;
    right: 20px;
    z-index: 100;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    backdrop-filter: blur(8px);
    background: rgba(255,255,255,0.04);
    transition: all 0.2s ease;
  " onmouseover="this.style.color='rgba(255,255,255,0.8)'; this.style.borderColor='rgba(255,255,255,0.35)'"
  onmouseout="this.style.color='rgba(255,255,255,0.4)'; this.style.borderColor='rgba(255,255,255,0.15)'">
    Effect 07 / 10
  </a>

  <div style="
    position: fixed;
    bottom: 20px;
    left: 24px;
    z-index: 100;
    pointer-events: none;
    user-select: none;
  ">
    <p style="
      margin: 0 0 3px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    ">Three.js Hero Backgrounds Pack</p>
    <p style="
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.04em;
    ">Black Hole</p>
  </div>
<script type="module">
    import * as THREE from 'three';

    import { createNoise2D } from 'https://cdn.jsdelivr.net/npm/simplex-noise@4.0.1/dist/esm/simplex-noise.js';
    // Configuration | Edit these values to customise the effect.
    const CONFIG = {
  // Event horizon (black circle) radius
  blackHoleRadius: 1.2,
  // Accretion disk inner glow colour (hottest zone)
  diskInnerColor: '#ff6600',
  // Accretion disk mid colour
  diskMidColor: '#ffcc00',
  // Accretion disk outer colour
  diskOuterColor: '#cc00ff',
  // Number of gravitational particles
  particleCount: 12000,
  // How fast particles orbit
  orbitSpeedMultiplier: 1.0,
  // How fast particles spiral inward (higher = particles consumed faster)
  inwardDriftSpeed: 0.0015,
  // Lensing ring brightness (0 to 1)
  lensingRingOpacity: 0.7,
  // Background star count
  starCount: 3000,
  // Camera orbit speed around the black hole
  cameraOrbitSpeed: 0.07,
};
    const IS_MOBILE = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i
                    .test(navigator.userAgent) || window.innerWidth < 768;
    const noise2D = createNoise2D();

    const canvas   = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: !IS_MOBILE, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, IS_MOBILE ? 1.5 : 2));
renderer.setClearColor(0x000000, 1);

    const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2.5, 9);

const eventHorizon = new THREE.Mesh(
  new THREE.CircleGeometry(CONFIG.blackHoleRadius, 64),
  new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide })
);
eventHorizon.renderOrder = 10;
// scene.add(eventHorizon);

let accretionDisk, accretionUniforms = null;

const diskGeo = new THREE.RingGeometry(
  CONFIG.blackHoleRadius * 1.04,
  3.5,
  128, 8
);

if (!IS_MOBILE) {
  accretionUniforms = {
    uTime:  { value: 0 },
    uPulse: { value: 1 },

    uColInner: { value: new THREE.Color(CONFIG.diskInnerColor) },
    uColMid:   { value: new THREE.Color(CONFIG.diskMidColor) },
    uColOuter: { value: new THREE.Color(CONFIG.diskOuterColor) },
  };

  const diskMat = new THREE.ShaderMaterial({
    uniforms: accretionUniforms,
    transparent: true,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending,
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;                                // pass UVs to fragment
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;
      uniform float uPulse;
      uniform vec3  uColInner;
      uniform vec3  uColMid;
      uniform vec3  uColOuter;

      void main() {
        // Polar coordinates from the centre of the UV square.
        // angle = direction around the disk; r = normalised distance out.
        float angle = atan(vUv.y - 0.5, vUv.x - 0.5);
        float r     = length(vUv - 0.5) * 2.0;   // 0 at centre → ~1 at edge

        // Colour gradient: inner→mid over r 0.0–0.5, mid→outer over 0.5–1.0.
        vec3 col = mix(uColInner, uColMid, smoothstep(0.0, 0.5, r));
        col      = mix(col, uColOuter, smoothstep(0.5, 1.0, r));

        // Brightness pulse swirling around the ring.
        float brightness = sin(angle * 3.0 + uTime * 2.0) * 0.3 + 0.7;

        // Rotating HOT SPOTS — bright patches that orbit the disk.
        float hot = pow(max(0.0, sin(angle * 6.0 + uTime * 3.0)), 4.0);
        brightness += hot * 0.6;

        // Opacity: solid near the inner edge, fading to 0 at the outer edge.
        float opacity = smoothstep(1.0, 0.3, r);

        // Fade out the very inner lip too so it blends into the horizon.
        opacity *= smoothstep(0.0, 0.15, r);

        col *= brightness * uPulse;              // breathing pulse
        gl_FragColor = vec4(col, opacity);
      }
    `,
  });

  accretionDisk = new THREE.Mesh(diskGeo, diskMat);
} else {

  const colors = [];
  const pos = diskGeo.attributes.position;
  const cInner = new THREE.Color(CONFIG.diskInnerColor);
  const cOuter = new THREE.Color(CONFIG.diskOuterColor);
  for (let i = 0; i < pos.count; i++) {
    const d = Math.hypot(pos.getX(i), pos.getY(i));
    const t = THREE.MathUtils.clamp((d - diskGeo.parameters.innerRadius) /
              (diskGeo.parameters.outerRadius - diskGeo.parameters.innerRadius), 0, 1);
    const c = cInner.clone().lerp(cOuter, t);
    colors.push(c.r, c.g, c.b);
  }
  diskGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  accretionDisk = new THREE.Mesh(diskGeo, new THREE.MeshBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0.6,
    depthWrite: false, side: THREE.DoubleSide, blending: THREE.AdditiveBlending,
  }));
}
accretionDisk.rotation.x = Math.PI * 0.28;
scene.add(accretionDisk);

const lensUniforms = {
  uTime:    { value: 0 },
  uOpacity: { value: CONFIG.lensingRingOpacity },
};
const lensRing = new THREE.Mesh(
  new THREE.RingGeometry(
    CONFIG.blackHoleRadius * 0.983,
    CONFIG.blackHoleRadius * 1.125,
    128, 2
  ),
  new THREE.ShaderMaterial({
    uniforms: lensUniforms,
    transparent: true,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending,
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;
      uniform float uOpacity;
      void main() {
        float pulse = sin(uTime * 4.0) * 0.3 + 0.7;     // breathing glow
        vec3 white = vec3(1.0);
        vec3 blue  = vec3(0.533, 0.667, 1.0);            // #88aaff
        vec3 col   = mix(blue, white, pulse);
        gl_FragColor = vec4(col, uOpacity * pulse);
      }
    `,
  })
);
lensRing.renderOrder = 9;
// scene.add(lensRing);

const count = (IS_MOBILE ? Math.round(CONFIG.particleCount * 0.42) : CONFIG.particleCount);

const positions = new Float32Array(count * 3);
const colors    = new Float32Array(count * 3);

const pAngle     = new Float32Array(count);
const pRadius    = new Float32Array(count);
const pOrbitSpd  = new Float32Array(count);
const pInDrift   = new Float32Array(count);
const pBaseDrift = new Float32Array(count);
const pVertOff   = new Float32Array(count);
const pSize      = new Float32Array(count);
const pBright    = new Float32Array(count);

const tmpColor = new THREE.Color();

function colorForRadius(r, brightness, i) {
  if      (r < 2.0) tmpColor.set(0xffffff);
  else if (r < 3.5) tmpColor.set(0xff8800);
  else if (r < 5.5) tmpColor.set(0xcc44ff);
  else              tmpColor.set(0x334466);
  colors[i*3+0] = tmpColor.r * brightness;
  colors[i*3+1] = tmpColor.g * brightness;
  colors[i*3+2] = tmpColor.b * brightness;
}

function spawnParticle(i, freshOuter = false) {
  const radius = freshOuter
      ? 6 + Math.random() * 3
      : Math.random() < 0.28
        ? CONFIG.blackHoleRadius * 1.14 + Math.random() * (2.0 - CONFIG.blackHoleRadius * 1.14)
        : 2.0 + Math.pow(Math.random(), 0.6) * 7.0;
  pAngle[i]     = Math.random() * Math.PI * 2;
  pRadius[i]    = radius;
  pOrbitSpd[i]  = (0.015 * CONFIG.orbitSpeedMultiplier) / Math.sqrt(radius);
  const drift   = (CONFIG.inwardDriftSpeed * 0.53) +
                  Math.random() * ((CONFIG.inwardDriftSpeed * 2) - (CONFIG.inwardDriftSpeed * 0.53));
  pBaseDrift[i] = drift;
  pInDrift[i]   = drift;
  pVertOff[i]   = (Math.random() - 0.5) * 0.8;
  pSize[i]      = 0.008 + Math.random() * 0.017;
  pBright[i]    = 0.4 + Math.random() * 0.6;
}

for (let i = 0; i < count; i++) {
  spawnParticle(i);
  positions[i*3+0] = Math.cos(pAngle[i]) * pRadius[i];
  positions[i*3+1] = Math.sin(pVertOff[i] * pRadius[i] * 0.1) * 0.3;
  positions[i*3+2] = Math.sin(pAngle[i]) * pRadius[i];
  colorForRadius(pRadius[i], pBright[i], i);
}

const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

const particleMat = new THREE.PointsMaterial({
  size: 0.05,
  vertexColors:    true,
  sizeAttenuation: true,
  transparent:     true,
  depthWrite:      false,
  blending:        THREE.AdditiveBlending,
  opacity:         0.9,
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

const starCount = (IS_MOBILE ? Math.round(CONFIG.starCount * 0.5) : CONFIG.starCount);
const starPos   = new Float32Array(starCount * 3);

for (let i = 0; i < starCount; i++) {

  const u = Math.random(), v = Math.random();
  const theta = u * Math.PI * 2;
  const phi   = Math.acos(2 * v - 1);
  const radius = 20 + Math.random() * 20;

  let x = radius * Math.sin(phi) * Math.cos(theta);
  let y = radius * Math.sin(phi) * Math.sin(theta);
  let z = radius * Math.cos(phi);

  const dist = Math.hypot(x, y);
  if (dist < 6 && dist > 0.001) {
    x += (x / dist) * (1.5 / dist);
    y += (y / dist) * (1.5 / dist);
  }

  starPos[i*3+0] = x;
  starPos[i*3+1] = y;
  starPos[i*3+2] = z;
}

const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starField = new THREE.Points(starGeo, new THREE.PointsMaterial({
  size: 0.012,
  color: 0xffffff,
  transparent: true,
  opacity: 0.6,
  sizeAttenuation: true,
}));
scene.add(starField);

const mouseNDC   = new THREE.Vector2(999, 999);
const mouseWorld = new THREE.Vector3();
const raycaster  = new THREE.Raycaster();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
let mouseActive = false;

window.addEventListener('pointermove', (e) => {
  mouseNDC.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
  mouseActive = true;
});
window.addEventListener('pointerleave', () => { mouseActive = false; });

let frameNo = 0;

function updateParticles(time, dt) {

  const doColors = !IS_MOBILE || (frameNo % 3 === 0);

  let mouseFeeding = false;
  let mouseAngle = 0;
  if (mouseActive) {
    raycaster.setFromCamera(mouseNDC, camera);
    if (raycaster.ray.intersectPlane(groundPlane, mouseWorld)) {
      const md = Math.hypot(mouseWorld.x, mouseWorld.z);
      if (md < 5) {
        mouseFeeding = true;
        mouseAngle = Math.atan2(mouseWorld.z, mouseWorld.x);
      }
    }
  }

  const lerpBack = Math.min(1, dt / 1.0);

  for (let i = 0; i < count; i++) {
    let targetDrift = pBaseDrift[i];
    if (mouseFeeding) {

      const align = Math.cos(pAngle[i] - mouseAngle) * 0.5 + 0.5;
      if (align > 0.6) targetDrift = pBaseDrift[i] * 1.5;
    }

    pInDrift[i] += (targetDrift - pInDrift[i]) * (mouseFeeding ? 0.2 : lerpBack);

    pAngle[i]  += pOrbitSpd[i];

    const jitter = noise2D(i * 0.01, time * 0.1) * 0.0004;
    pRadius[i] -= (pInDrift[i] + jitter);

    if (pRadius[i] < CONFIG.blackHoleRadius) {
      spawnParticle(i, true);
      if (doColors) colorForRadius(pRadius[i], pBright[i], i);
    }

    const r = pRadius[i];
    const a = pAngle[i];

    positions[i*3+0] = Math.cos(a) * r;
    positions[i*3+1] = Math.sin(pVertOff[i] * r * 0.1) * 0.3;
    positions[i*3+2] = Math.sin(a) * r;

    if (doColors) colorForRadius(r, pBright[i], i);
  }

  particleGeo.attributes.position.needsUpdate = true;
  if (doColors) particleGeo.attributes.color.needsUpdate = true;
}

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt   = Math.min(clock.getDelta(), 0.05);
  const time = clock.getElapsedTime();
  frameNo++;

  const pulse = Math.abs(Math.sin(time * 1.8)) * 0.3 + 0.7;

  eventHorizon.lookAt(camera.position);
  const ehScale = 1.0 + Math.sin(time * 1.5) * 0.015;
  eventHorizon.scale.setScalar(ehScale);

  if (accretionUniforms) {
    accretionUniforms.uTime.value  = time;
    accretionUniforms.uPulse.value = pulse;
  }

  lensUniforms.uTime.value    = time;
  lensUniforms.uOpacity.value = CONFIG.lensingRingOpacity * pulse;
  lensRing.lookAt(camera.position);

  updateParticles(time, dt);

  starField.rotation.y += 0.00008;

  camera.position.x = Math.sin(time * CONFIG.cameraOrbitSpeed) * 1.5;
  camera.position.y = 2.5 + Math.cos(time * 0.05) * 0.8;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
