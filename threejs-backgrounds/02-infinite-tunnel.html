<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Infinite Tunnel — Three.js Hero Background (Effect 02)</title>

<!--
  ============================================================================
  INFINITE GEOMETRIC TUNNEL — Fornasetti-style fly-through hero background
  ============================================================================

  CUSTOMISATION GUIDE (quick reference — see CONFIG block in the script):
    • Tunnel radius .... CONFIG.tunnelRadius (default 3.5). Bigger = wider corridor.
    • Fly speed ........ CONFIG.flySpeed (default 0.25). Higher = faster travel.
    • Rotation speed ... CONFIG.tunnelSpin (default 0.0015). Barrel-roll rate.
    • Colour themes .... THEMES object. Add/edit entries {tunnel, ring, bg}.
    • FOV .............. CONFIG.fov (default 90). Wider FOV = more immersive.
  ============================================================================
-->

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    /* IMPORTANT: keep this transparent. The canvas uses z-index:-1, which places
       it BEHIND the body. An opaque body background would paint over the canvas
       and hide the tunnel (you'd only see the overlay). The WebGL renderer clears
       to black itself, so the page still looks pure black. */
    background: transparent;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  }

  /* Full-viewport canvas pinned behind everything */
  #tunnel-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    display: block;
    background: #000000;
  }

  /* Demo overlay — does NOT capture pointer events so the mouse still steers */
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: #ffffff;
    pointer-events: none;     /* critical: clicks/moves pass through to canvas */
    user-select: none;
    z-index: 1;
  }

  .overlay h1 {
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    margin: 0 0 0.5rem;
    text-transform: uppercase;
    text-shadow: 0 0 30px rgba(0, 200, 255, 0.5);
  }

  .overlay p {
    font-size: clamp(0.9rem, 2vw, 1.2rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.7;
    margin: 0 0 2rem;
  }

  .overlay .cta {
    pointer-events: auto;     /* re-enable clicking for the button only */
    display: inline-block;
    padding: 0.9rem 2.4rem;
    border: 1px solid rgba(255, 255, 255, 0.6);
    border-radius: 2px;
    color: #ffffff;
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: transparent;
    transition: background 0.3s ease, color 0.3s ease;
  }
  .overlay .cta:hover {
    background: #ffffff;
    color: #000000;
  }

  /* Theme switcher buttons — top-right, above everything */
  .theme-switch {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 10;
    display: flex;
    gap: 8px;
  }
  .theme-switch button {
    pointer-events: auto;
    padding: 0.5rem 1rem;
    border: 1px solid rgba(255, 255, 255, 0.35);
    background: rgba(0, 0, 0, 0.4);
    color: #ffffff;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: border-color 0.25s ease, color 0.25s ease;
  }
  .theme-switch button:hover { border-color: #ffffff; }
  .theme-switch button.active { border-color: #ffffff; color: #00ffff; }
</style>
</head>
<body>

  <canvas id="tunnel-canvas"></canvas>

  <!-- Theme switcher -->
  <div class="theme-switch">
    <button data-theme="cyber" class="active">Cyber</button>
    <button data-theme="neon">Neon</button>
    <button data-theme="matrix">Matrix</button>
  </div>

  <!-- Demo hero overlay -->
  <div class="overlay">
    <h1>Infinite Tunnel</h1>
    <p>Three.js Hero Background — Effect 02</p>
    <a href="#" class="cta">Enter</a>
  </div>

  <!-- Three.js r158 via import map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
    }
  }
  </script>

  <!-- On-screen error reporter: surfaces any runtime/module-load failure -->
  <div id="err" style="position:fixed;top:0;left:0;right:0;z-index:999;
    background:#900;color:#fff;font:13px monospace;padding:10px;
    white-space:pre-wrap;display:none;"></div>
  <script>
    window.addEventListener('error', (e) => {
      const el = document.getElementById('err');
      el.style.display = 'block';
      el.textContent = 'ERROR: ' + (e.message || e.error || e) +
        '\n' + (e.filename || '') + ':' + (e.lineno || '');
    });
    window.addEventListener('unhandledrejection', (e) => {
      const el = document.getElementById('err');
      el.style.display = 'block';
      el.textContent = 'PROMISE ERROR: ' + (e.reason && e.reason.message || e.reason);
    });
  </script>

  <script type="module">
    import * as THREE from 'three';

    // =========================================================================
    // CONFIG — tweak everything here
    // =========================================================================
    const isMobile = /Mobi|Android/i.test(navigator.userAgent) || window.innerWidth < 768;

    const CONFIG = {
      fov:           90,                       // wide FOV = more immersive tunnel
      tunnelRadius:  3.5,                       // radius of the main octagonal tube
      tunnelLength:  500,                       // path length (z = 10 -> -500)
      tubeSegments:  isMobile ? 400 : 800,      // length subdivisions
      tubeSides:     isMobile ? 6   : 8,        // radial sides (8 = octagon)
      ringCount:     isMobile ? 20  : 40,       // number of recycling rings
      ringSpacing:   12,                        // units between rings
      streakCount:   isMobile ? 80  : 200,      // hyperspace star streaks
      flySpeed:      isMobile ? 0.18 : 0.05,    // base forward speed per frame
      tunnelSpin:    0.0015,                    // barrel-roll rotation per frame
      useInnerTube:  !isMobile,                 // secondary counter-rotating layer
      resetZ:        -480,                      // camera reset threshold (loop point)
    };

    // Colour themes: {tunnel wireframe, rings, background/fog}
    const THEMES = {
      cyber:  { tunnel: 0x0044ff, ring: 0x00ffff, bg: 0x000000 },
      neon:   { tunnel: 0xff0088, ring: 0xffff00, bg: 0x05000a },
      matrix: { tunnel: 0x00ff41, ring: 0x00aa22, bg: 0x000a00 },
    };
    let currentTheme = THEMES.cyber;

    // =========================================================================
    // RENDERER / SCENE / CAMERA
    // =========================================================================
    const canvas = document.getElementById('tunnel-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(currentTheme.bg, 1);

    const scene = new THREE.Scene();

    // ---- FOG: the depth-illusion secret -------------------------------------
    // Fog fades geometry to the background colour between z=30 and z=200 (camera
    // space). The tunnel is finite (ends at z=-500), but fog hides the far end
    // in blackness so the corridor *appears* to continue forever. Without fog
    // you would see the geometry abruptly stop. This is essential to the
    // infinite-depth feel.
    scene.fog = new THREE.Fog(currentTheme.bg, 30, 200);

    // position (0,0,8): start just inside the tunnel mouth (tunnel runs to +10)
    const camera = new THREE.PerspectiveCamera(
      CONFIG.fov, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    camera.position.set(0, 0, 8);

    // =========================================================================
    // MAIN TUNNEL — TubeGeometry rendered from the INSIDE
    // =========================================================================
    // A straight LineCurve3 gives us a long cylinder. TubeGeometry wraps a tube
    // of `radius` around that path.
    //
    // BackSide rendering: by default Three.js culls back faces, so from inside a
    // tube you'd see *nothing* (all faces point outward, away from you). Setting
    // side: THREE.BackSide flips which faces are drawn — we render the INNER
    // surface of the tube, which is exactly the wall we fly through. This is the
    // whole trick that makes the camera feel like it's *inside* the corridor.
    const path = new THREE.LineCurve3(
      new THREE.Vector3(0, 0, 10),
      new THREE.Vector3(0, 0, -CONFIG.tunnelLength)
    );

    const tubeGeo = new THREE.TubeGeometry(
      path, CONFIG.tubeSegments, CONFIG.tunnelRadius, CONFIG.tubeSides, false
    );
    const tunnelMat = new THREE.MeshBasicMaterial({
      color: currentTheme.tunnel,
      side: THREE.BackSide,   // render inside surface — see explanation above
      wireframe: true,
      transparent: true,
      opacity: 0.6,
    });
    const tunnel = new THREE.Mesh(tubeGeo, tunnelMat);
    scene.add(tunnel);

    // ---- SECONDARY INNER TUBE (counter-rotating) ----------------------------
    // A tighter, square (4-sided) tube nested inside. It spins the OPPOSITE way
    // to the main tunnel, producing a hypnotic layered-parallax depth effect.
    let innerTunnel = null;
    if (CONFIG.useInnerTube) {
      const innerGeo = new THREE.TubeGeometry(path, CONFIG.tubeSegments, 2.8, 4, false);
      const innerMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        side: THREE.BackSide,
        wireframe: true,
        transparent: true,
        opacity: 0.08,
      });
      innerTunnel = new THREE.Mesh(innerGeo, innerMat);
      scene.add(innerTunnel);
    }

    // =========================================================================
    // RINGS — segmented "space-station corridor" markers
    // =========================================================================
    // RingGeometry with 8 theta segments matches the octagonal tunnel cross
    // section. Spread evenly down the tube; each remembers its originalZ.
    const rings = [];
    const ringGeo = new THREE.RingGeometry(3.2, 3.8, CONFIG.tubeSides);
    for (let i = 0; i < CONFIG.ringCount; i++) {
      const mat = new THREE.MeshBasicMaterial({
        color: currentTheme.ring,
        transparent: true,
        opacity: 0.35,
        side: THREE.DoubleSide,
      });
      const ring = new THREE.Mesh(ringGeo, mat);
      ring.position.z = -i * CONFIG.ringSpacing;
      ring.userData.originalZ = ring.position.z;   // for reset logic
      scene.add(ring);
      rings.push(ring);
    }

    // =========================================================================
    // PARTICLE STREAKS — hyperspace star-blur lines
    // =========================================================================
    // Each streak is a short 2-point Line drawn along Z. Streaks move faster
    // than the camera so they smear past — the classic sci-fi light-speed look.
    const streaks = [];
    function randRange(a, b) { return a + Math.random() * (b - a); }

    for (let i = 0; i < CONFIG.streakCount; i++) {
      const len = randRange(0.8, 2.0);
      const x = randRange(-3, 3);
      const y = randRange(-2, 2);
      const z = randRange(camera.position.z - 5, camera.position.z - 60);

      const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(x, y, z),
        new THREE.Vector3(x, y, z - len),
      ]);
      const mat = new THREE.LineBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: randRange(0.3, 0.7),
      });
      const line = new THREE.Line(geo, mat);
      line.userData = {
        x, y, len,
        speedMul: randRange(1.2, 2.5),   // faster than camera => motion blur
      };
      scene.add(line);
      streaks.push(line);
    }

    function placeStreak(line, z) {
      const { x, y, len } = line.userData;
      const pos = line.geometry.attributes.position;
      pos.setXYZ(0, x, y, z);
      pos.setXYZ(1, x, y, z - len);
      pos.needsUpdate = true;
    }

    // =========================================================================
    // MOUSE STEERING
    // =========================================================================
    const mouse = { x: 0, y: 0 };
    window.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -((e.clientY / window.innerHeight) * 2 - 1);
    });
    // Basic touch support
    window.addEventListener('touchmove', (e) => {
      if (!e.touches.length) return;
      const t = e.touches[0];
      mouse.x = (t.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -((t.clientY / window.innerHeight) * 2 - 1);
    }, { passive: true });

    const lerp = (a, b, t) => a + (b - a) * t;
    // Linear colour blend for theme tweening
    const tmpA = new THREE.Color();
    const tmpB = new THREE.Color();
    function lerpColor(material, targetHex, t) {
      tmpA.copy(material.color);
      tmpB.set(targetHex);
      material.color.copy(tmpA.lerp(tmpB, t));
    }

    // =========================================================================
    // THEME SWITCHING — tween colours over ~1s
    // =========================================================================
    let themeTarget = currentTheme;
    let themeBlend = 1;   // 1 = settled, <1 = mid-transition
    const fogColor = new THREE.Color(currentTheme.bg);

    document.querySelectorAll('.theme-switch button').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.theme-switch button')
          .forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        themeTarget = THEMES[btn.dataset.theme];
        themeBlend = 0;   // restart the tween
      });
    });

    // =========================================================================
    // ANIMATION LOOP
    // =========================================================================
    let time = 0;
    let speedBoost = 0;
    let lastBurst = 0;
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      time += dt;

      // ---- SPEED VARIATION --------------------------------------------------
      // Gentle sinusoidal pulse + an occasional burst every 8s that decays away.
      speedBoost *= 0.95;                              // decay any active burst
      if (time - lastBurst > 8) {                      // burst window
        speedBoost = 0.6 - 0.25;                       // push toward ~0.6 total
        lastBurst = time;
      }
      const flySpeed =
        0.25 + Math.sin(time * 0.5) * 0.08 + speedBoost;

      // ---- INFINITE FORWARD SCROLL (seamless loop) --------------------------
      // The tunnel geometry is STATIC. Only the camera advances. When it passes
      // the loop threshold we snap it back to z=0. Because the tube is uniform
      // along its length, the jump is invisible — a seamless infinite corridor.
      camera.position.z -= flySpeed;
      if (camera.position.z < CONFIG.resetZ) {
        camera.position.z = 0;
      }

      // ---- MOUSE STEERING (Fornasetti-style, subtle) ------------------------
      const targetX = mouse.x * 1.8;
      const targetY = mouse.y * 1.0;
      camera.position.x = lerp(camera.position.x, targetX, 0.04);
      camera.position.y = lerp(camera.position.y, targetY, 0.04);

      // Look-ahead steering: aim the camera at a point slightly ahead and
      // partially toward the mouse offset. The 0.3 factor keeps the turn gentle
      // and the -20 look-ahead makes it feel like banking a spacecraft rather
      // than snapping the view.
      camera.lookAt(
        camera.position.x * 0.3,
        camera.position.y * 0.3,
        camera.position.z - 20
      );

      // ---- TUNNEL ROTATION --------------------------------------------------
      tunnel.rotation.z += CONFIG.tunnelSpin + mouse.x * 0.0008; // barrel roll
      if (innerTunnel) {
        innerTunnel.rotation.z -= 0.001;   // counter-rotate for layered depth
      }

      // ---- RING RECYCLING (infinite) ----------------------------------------
      // Rings are independent meshes. Once a ring slips behind the camera we
      // shove it 480 units forward (40 * spacing) so it re-enters far ahead —
      // an endless conveyor of corridor segments.
      const recycleDist = CONFIG.ringCount * CONFIG.ringSpacing;
      for (const ring of rings) {
        if (ring.position.z > camera.position.z + 10) {
          ring.position.z -= recycleDist;
        }
      }

      // ---- PARTICLE STREAKS -------------------------------------------------
      for (const line of streaks) {
        const pos = line.geometry.attributes.position;
        const newZ0 = pos.getZ(0) + flySpeed * line.userData.speedMul; // forward
        // Note: streaks move toward +z relative to receding camera = blur past
        const z = newZ0;
        if (z > camera.position.z + 2) {
          placeStreak(line, camera.position.z - 60);   // recycle far ahead
        } else {
          placeStreak(line, z);
        }
      }

      // ---- THEME COLOUR TWEEN -----------------------------------------------
      if (themeBlend < 1) {
        themeBlend = Math.min(1, themeBlend + dt);     // ~1 second transition
        lerpColor(tunnelMat, themeTarget.tunnel, 0.08);
        for (const ring of rings) lerpColor(ring.material, themeTarget.ring, 0.08);
        fogColor.lerp(new THREE.Color(themeTarget.bg), 0.08);
        scene.fog.color.copy(fogColor);
        renderer.setClearColor(fogColor, 1);
        if (themeBlend >= 1) currentTheme = themeTarget;
      }

      renderer.render(scene, camera);
    }
    animate();

    // =========================================================================
    // RESIZE
    // =========================================================================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
