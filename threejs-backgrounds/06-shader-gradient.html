<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>06 — Shader Gradient</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a1a;
      color: #ffffff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: -1;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>

  <a href="#" onclick="document.querySelector('pre') && document.querySelector('pre').style.display === 'none' ? document.querySelector('pre').style.display = 'block' : null; return false;" style="
    position: fixed;
    top: 18px;
    right: 20px;
    z-index: 100;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    backdrop-filter: blur(8px);
    background: rgba(255,255,255,0.04);
    transition: all 0.2s ease;
  " onmouseover="this.style.color='rgba(255,255,255,0.8)'; this.style.borderColor='rgba(255,255,255,0.35)'"
  onmouseout="this.style.color='rgba(255,255,255,0.4)'; this.style.borderColor='rgba(255,255,255,0.15)'">
    Effect 06 / 10
  </a>

  <div style="
    position: fixed;
    bottom: 20px;
    left: 24px;
    z-index: 100;
    pointer-events: none;
    user-select: none;
  ">
    <p style="
      margin: 0 0 3px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    ">Three.js Hero Backgrounds Pack</p>
    <p style="
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.04em;
    ">Shader Gradient</p>
  </div>

<div id="canvas-container"></div>

  <script id="vert" type="x-shader/x-vertex">
    varying vec2 vUv;

    void main() {
      vUv = uv;

      gl_Position = vec4(position, 1.0);
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    // ??? Configuration ? edit these values to customise the effect ???????????????
    const CONFIG = {
      // First gradient colour
      color1: '#6366f1',
      // Second gradient colour
      color2: '#8b5cf6',
      // Third gradient colour
      color3: '#06b6d4',
      // Fourth gradient colour
      color4: '#ec4899',
      // How fast the gradient moves (lower = more elegant)
      animationSpeed: 0.008,
      // How much mouse movement shifts the gradient
      mouseInfluence: 2.0,
      // Vignette darkness at edges (0 = no vignette, 1 = very dark edges)
      vignetteStrength: 0.6,
    };

    function hexToVec3(hex) {
      const r = parseInt(hex.slice(1, 3), 16) / 255;
      const g = parseInt(hex.slice(3, 5), 16) / 255;
      const b = parseInt(hex.slice(5, 7), 16) / 255;
      return `vec3(${r.toFixed(3)},${g.toFixed(3)},${b.toFixed(3)})`;
    }

    const fragmentShader = `
    uniform float uTime;
    uniform vec2  uResolution;
    uniform vec2  uMouse;
    varying vec2 vUv;
    void main() {
      vec3 c1 = ${hexToVec3(CONFIG.color1)};
      vec3 c2 = ${hexToVec3(CONFIG.color2)};
      vec3 c3 = ${hexToVec3(CONFIG.color3)};
      vec3 c4 = ${hexToVec3(CONFIG.color4)};
      vec3 c5 = vec3(0.118, 0.106, 0.294);
      float layer1 = sin(vUv.x * 3.0 + uTime * 0.5 + uMouse.x * ${CONFIG.mouseInfluence.toFixed(3)}) * 0.5 + 0.5;
      float layer2 = sin(vUv.y * 2.5 + uTime * 0.4 + uMouse.y * ${(CONFIG.mouseInfluence * 0.75).toFixed(3)}) * 0.5 + 0.5;
      float layer3 = sin((vUv.x + vUv.y) * 2.0 + uTime * 0.3) * 0.5 + 0.5;
      vec3 col = mix(c1, c2, layer1);
      col = mix(col, c3, layer2 * 0.65);
      col = mix(col, c4, layer3 * 0.45);
      float shadow = (1.0 - layer1) * (1.0 - layer2) * (1.0 - layer3);
      col = mix(col, c5, shadow * ${CONFIG.vignetteStrength.toFixed(3)});
      float dist = length(vUv - 0.5);
      float vignette = smoothstep(0.45, 0.0, dist);
      col = mix(c5, col, vignette * (1.0 - ${CONFIG.vignetteStrength.toFixed(3)} * 0.42) + 0.25);
      gl_FragColor = vec4(col, 1.0);
    }
    `;
    const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false });
    renderer.setPixelRatio(1);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    const uniforms = {
      uTime:       { value: 0.0 },
      uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      uMouse:      { value: new THREE.Vector2(0.5, 0.5) },
    };

    const geometry = new THREE.PlaneGeometry(2, 2);
    const material = new THREE.ShaderMaterial({
      vertexShader:   document.getElementById('vert').textContent,
      fragmentShader,
      uniforms,
    });
    scene.add(new THREE.Mesh(geometry, material));

    const mouseTarget = new THREE.Vector2(0.5, 0.5);

    window.addEventListener('mousemove', (e) => {

      mouseTarget.set(
        e.clientX / window.innerWidth,
        1.0 - e.clientY / window.innerHeight
      );
    });

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      uniforms.uTime.value += CONFIG.animationSpeed;

      uniforms.uMouse.value.lerp(mouseTarget, 0.04);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
