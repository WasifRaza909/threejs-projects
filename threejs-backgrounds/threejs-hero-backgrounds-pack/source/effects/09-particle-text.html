<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle Text — Three.js Hero Background</title>

  <script type="importmap">
    {
      "imports": {
        "three":         "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050508;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      display: block;
    }

  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <a href="#" onclick="document.querySelector('pre') && document.querySelector('pre').style.display === 'none' ? document.querySelector('pre').style.display = 'block' : null; return false;" style="
    position: fixed;
    top: 18px;
    right: 20px;
    z-index: 100;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    backdrop-filter: blur(8px);
    background: rgba(255,255,255,0.04);
    transition: all 0.2s ease;
  " onmouseover="this.style.color='rgba(255,255,255,0.8)'; this.style.borderColor='rgba(255,255,255,0.35)'"
  onmouseout="this.style.color='rgba(255,255,255,0.4)'; this.style.borderColor='rgba(255,255,255,0.15)'">
    Effect 09 / 10
  </a>

  <div data-particle-controls style="
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
  ">
    <input
      id="textInput"
      type="text"
      style="
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #ffffff;
        background: rgba(255,255,255,0.06);
        border: 0.5px solid rgba(255,255,255,0.2);
        border-radius: 8px;
        padding: 8px 16px;
        outline: none;
        width: 160px;
        text-align: center;
        backdrop-filter: blur(8px);
      "
      placeholder="TYPE HERE"
    />
    <button onclick="updateParticleText(document.getElementById('textInput').value)" style="
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.08);
      border: 0.5px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
    ">Rebuild</button>
  </div>
<script type="module">
    import * as THREE from 'three';
    // Configuration | Edit these values to customise the effect.
    const CONFIG = {
      // Default word displayed as particles
      defaultText: 'AGENCY',
      // Font used to sample particle positions
      textFont: 'bold 130px Arial',
      // Particle colour at the top of the text
      colorTop: '#a78bfa',
      // Particle colour at the bottom of the text
      colorBottom: '#06b6d4',
      // Particle size
      particleSize: 0.045,
      // How fast particles assemble into the text shape (lower = slower, more dramatic)
      assemblySpeed: 0.035,
      // Mouse hover scatter radius
      scatterRadius: 1.2,
      // How strongly mouse scatters particles
      scatterForce: 0.4,
      // Sampling density ? every Nth pixel is sampled (lower = more particles, heavier)
      samplingDensity: 4,
    };
    const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)
                  || window.innerWidth < 768;

    const textInput = document.getElementById('textInput');
    if (textInput) textInput.value = CONFIG.defaultText;

    const WORDS = isMobile ? ['HI', 'YO'] : [CONFIG.defaultText, 'HELLO'];

    const SAMPLE_STEP = isMobile ? Math.max(6, CONFIG.samplingDensity) : CONFIG.samplingDensity;
    const PARTICLE_COUNT = isMobile ? 3500 : 9000;

    const TEXT_CANVAS_W = 1200;
    const TEXT_CANVAS_H = 200;

    const WORLD_SPAN_X = 12;
    const WORLD_SPAN_Y = 3;

    const ASSEMBLE_LERP = CONFIG.assemblySpeed;
    const RETURN_LERP   = 0.025;
    const STAGGER_FRAMES = 30;
    const FRICTION       = 0.92;

    const HOVER_RADIUS = CONFIG.scatterRadius;
    const HOVER_FORCE  = CONFIG.scatterForce;

    const COLOR_TOP    = new THREE.Color(CONFIG.colorTop);
    const COLOR_BOTTOM = new THREE.Color(CONFIG.colorBottom);

    const canvas   = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene  = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      70, window.innerWidth / window.innerHeight, 0.1, 100
    );
    camera.position.z = 7;

    function sampleText(text) {
      const c   = document.createElement('canvas');
      c.width   = TEXT_CANVAS_W;
      c.height  = TEXT_CANVAS_H;
      const ctx = c.getContext('2d');

      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, TEXT_CANVAS_W, TEXT_CANVAS_H);

      ctx.fillStyle    = '#ffffff';
      ctx.font         = CONFIG.textFont;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      const maxWidth = TEXT_CANVAS_W * 0.92;
      const measured = ctx.measureText(text).width;
      if (measured > maxWidth) {
        const fontSize = Math.max(isMobile ? 38 : 46, Math.floor(parseFloat(CONFIG.textFont.match(/\d+/)?.[0] || 130) * maxWidth / measured));
        ctx.font = CONFIG.textFont.replace(/\d+(?=px)/, fontSize);
      }
      ctx.fillText(text, TEXT_CANVAS_W / 2, TEXT_CANVAS_H / 2, maxWidth);

      const data = ctx.getImageData(0, 0, TEXT_CANVAS_W, TEXT_CANVAS_H).data;

      const points = [];
      for (let y = 0; y < TEXT_CANVAS_H; y += SAMPLE_STEP) {
        for (let x = 0; x < TEXT_CANVAS_W; x += SAMPLE_STEP) {
          const idx        = (y * TEXT_CANVAS_W + x) * 4;
          const brightness = data[idx];
          if (brightness > 128) {
            const wx =  (x - TEXT_CANVAS_W / 2) / TEXT_CANVAS_W * WORLD_SPAN_X;
            const wy = -(y - TEXT_CANVAS_H / 2) / TEXT_CANVAS_H * WORLD_SPAN_Y;
            points.push({ wx, wy });
          }
        }
      }
      return points;
    }

    const firstSample   = sampleText(CONFIG.defaultText);

    function samplePoint(sample, i, activeCount) {
      const index = activeCount === sample.length
        ? i
        : Math.floor(i * sample.length / activeCount);
      return sample[Math.min(index, sample.length - 1)];
    }

    const targetPositions  = new Float32Array(PARTICLE_COUNT * 3);
    const currentPositions = new Float32Array(PARTICLE_COUNT * 3);
    const velocities       = new Float32Array(PARTICLE_COUNT * 3);
    const colors           = new Float32Array(PARTICLE_COUNT * 3);
    const releaseFrame     = new Int32Array(PARTICLE_COUNT);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const activeCount = Math.min(PARTICLE_COUNT, firstSample.length);
      const p = i < activeCount ? samplePoint(firstSample, i, activeCount) : null;

      targetPositions[i * 3]     = p ? p.wx : (Math.random() * 2 - 1) * 10;
      targetPositions[i * 3 + 1] = p ? p.wy : (Math.random() * 2 - 1) * 6;
      targetPositions[i * 3 + 2] = p ? 0 : -5;

      currentPositions[i * 3]     = (Math.random() * 2 - 1) * 8;
      currentPositions[i * 3 + 1] = (Math.random() * 2 - 1) * 5;
      currentPositions[i * 3 + 2] = (Math.random() * 2 - 1) * 3;

      releaseFrame[i] = i % STAGGER_FRAMES;

      const t = p ? (p.wy / WORLD_SPAN_Y) + 0.5 : 0;
      const col = COLOR_BOTTOM.clone().lerp(COLOR_TOP, THREE.MathUtils.clamp(t, 0, 1));
      colors[i * 3]     = col.r;
      colors[i * 3 + 1] = col.g;
      colors[i * 3 + 2] = col.b;
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
    geometry.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size:         CONFIG.particleSize,
      transparent:  true,
      opacity:      0.9,
      vertexColors: true,
      depthWrite:   false,
      blending:     THREE.AdditiveBlending,
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    function setWord(text) {
      text = (text || CONFIG.defaultText).trim().toUpperCase() || CONFIG.defaultText;
      const sample = sampleText(text);
      const activeCount = Math.min(PARTICLE_COUNT, sample.length);
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        if (i < activeCount) {
          const p = samplePoint(sample, i, activeCount);
          targetPositions[i * 3]     = p.wx;
          targetPositions[i * 3 + 1] = p.wy;
          targetPositions[i * 3 + 2] = 0;

          const t = (p.wy / WORLD_SPAN_Y) + 0.5;
          const col = COLOR_BOTTOM.clone().lerp(COLOR_TOP, THREE.MathUtils.clamp(t, 0, 1));
          colors[i * 3]     = col.r;
          colors[i * 3 + 1] = col.g;
          colors[i * 3 + 2] = col.b;
        } else {

          targetPositions[i * 3]     = (Math.random() * 2 - 1) * 10;
          targetPositions[i * 3 + 1] = (Math.random() * 2 - 1) * 6;
          targetPositions[i * 3 + 2] = -5;
        }

        velocities[i * 3]     = (Math.random() * 2 - 1) * 0.25;
        velocities[i * 3 + 1] = (Math.random() * 2 - 1) * 0.25;
        velocities[i * 3 + 2] = (Math.random() * 2 - 1) * 0.25;
      }
      geometry.attributes.color.needsUpdate = true;
    }

    window.updateParticleText = (text) => {
      setWord(text);
      frame = 0;
      const input = document.getElementById('textInput');
      if (input) input.value = (text || CONFIG.defaultText).trim().toUpperCase() || CONFIG.defaultText;
    };

    let wordIndex = 0;
    if (!isMobile) {
      window.addEventListener('click', (e) => {
        if (e.target.closest('[data-particle-controls]')) return;
        wordIndex = (wordIndex + 1) % WORDS.length;
        setWord(WORDS[wordIndex]);
      });
    }

    const DUST_COUNT = 1500;
    const dustPositions = new Float32Array(DUST_COUNT * 3);
    for (let i = 0; i < DUST_COUNT; i++) {
      dustPositions[i * 3]     = (Math.random() * 2 - 1) * 14;
      dustPositions[i * 3 + 1] = (Math.random() * 2 - 1) * 9;
      dustPositions[i * 3 + 2] = (Math.random() * 2 - 1) * 6 - 3;
    }
    const dustGeo = new THREE.BufferGeometry();
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
    const dust = new THREE.Points(dustGeo, new THREE.PointsMaterial({
      size:        0.012,
      color:       0xffffff,
      transparent: true,
      opacity:     0.2,
      depthWrite:  false,
    }));
    scene.add(dust);

    const mouseNDC   = new THREE.Vector2(-10, -10);
    const mouseWorld = new THREE.Vector3(-10, -10, 0);
    const raycaster  = new THREE.Raycaster();
    const textPlane  = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

    if (!isMobile) {
      window.addEventListener('mousemove', (e) => {
        mouseNDC.x = (e.clientX / window.innerWidth)  * 2 - 1;
        mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouseNDC, camera);
        raycaster.ray.intersectPlane(textPlane, mouseWorld);
      });
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const posArray = geometry.attributes.position.array;
    let frame = 0;
    let time  = 0;

    function animate() {
      requestAnimationFrame(animate);
      frame++;
      time += 0.016;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;

        if (frame < releaseFrame[i]) continue;

        if (!isMobile) {
          const dx = posArray[ix] - mouseWorld.x;
          const dy = posArray[iy] - mouseWorld.y;
          const dist = Math.hypot(dx, dy);
          if (dist < HOVER_RADIUS && dist > 0.0001) {
            const strength = (1 - dist / HOVER_RADIUS) * HOVER_FORCE;
            velocities[ix] += (dx / dist) * strength;
            velocities[iy] += (dy / dist) * strength;
          }
        }

        posArray[ix] += velocities[ix];
        posArray[iy] += velocities[iy];
        posArray[iz] += velocities[iz];
        velocities[ix] *= FRICTION;
        velocities[iy] *= FRICTION;
        velocities[iz] *= FRICTION;

        const lerp = frame < 160 ? ASSEMBLE_LERP : RETURN_LERP;
        posArray[ix] += (targetPositions[ix] - posArray[ix]) * lerp;
        posArray[iy] += (targetPositions[iy] - posArray[iy]) * lerp;
        posArray[iz] += (targetPositions[iz] - posArray[iz]) * lerp;
      }
      geometry.attributes.position.needsUpdate = true;

      for (let i = 0; i < DUST_COUNT; i++) {
        dustPositions[i * 3 + 1] += 0.0003 + 0.0007;
        if (dustPositions[i * 3 + 1] > 9) dustPositions[i * 3 + 1] = -9;
      }
      dustGeo.attributes.position.needsUpdate = true;
      dust.rotation.y += 0.0002;

      camera.position.y = Math.sin(time * 0.4) * 0.1;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
