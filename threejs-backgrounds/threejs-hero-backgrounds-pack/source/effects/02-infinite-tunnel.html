<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Infinite Tunnel — Three.js Hero Background (Effect 02)</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;

    background: transparent;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  }

  #tunnel-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    display: block;
    background: #000000;
  }

  .theme-switch {
    position: absolute;
    top: 58px;
    right: 20px;
    z-index: 10;
    display: flex;
    gap: 8px;
  }
  .theme-switch button {
    pointer-events: auto;
    padding: 0.5rem 1rem;
    border: 1px solid rgba(255, 255, 255, 0.35);
    background: rgba(0, 0, 0, 0.4);
    color: #ffffff;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: border-color 0.25s ease, color 0.25s ease;
  }
  .theme-switch button:hover { border-color: #ffffff; }
  .theme-switch button.active { border-color: #ffffff; color: #00ffff; }
</style>
</head>
<body>

  <canvas id="tunnel-canvas"></canvas>

  <a href="#" onclick="document.querySelector('pre') && document.querySelector('pre').style.display === 'none' ? document.querySelector('pre').style.display = 'block' : null; return false;" style="
    position: fixed;
    top: 18px;
    right: 20px;
    z-index: 100;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    backdrop-filter: blur(8px);
    background: rgba(255,255,255,0.04);
    transition: all 0.2s ease;
  " onmouseover="this.style.color='rgba(255,255,255,0.8)'; this.style.borderColor='rgba(255,255,255,0.35)'"
  onmouseout="this.style.color='rgba(255,255,255,0.4)'; this.style.borderColor='rgba(255,255,255,0.15)'">
    Effect 02 / 10
  </a>

  <div style="
    position: fixed;
    bottom: 20px;
    left: 24px;
    z-index: 100;
    pointer-events: none;
    user-select: none;
  ">
    <p style="
      margin: 0 0 3px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    ">Three.js Hero Backgrounds Pack</p>
    <p style="
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.04em;
    ">Infinite Tunnel</p>
  </div>

  <div class="theme-switch">
    <button data-theme="cyber" class="active">Cyber</button>
    <button data-theme="neon">Neon</button>
    <button data-theme="matrix">Matrix</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
    }
  }
  </script>

  <div id="err" style="position:fixed;top:0;left:0;right:0;z-index:999;
    background:#900;color:#fff;font:13px monospace;padding:10px;
    white-space:pre-wrap;display:none;"></div>
  <script>
    window.addEventListener('error', (e) => {
      const el = document.getElementById('err');
      el.style.display = 'block';
      el.textContent = 'ERROR: ' + (e.message || e.error || e) +
        '\n' + (e.filename || '') + ':' + (e.lineno || '');
    });
    window.addEventListener('unhandledrejection', (e) => {
      const el = document.getElementById('err');
      el.style.display = 'block';
      el.textContent = 'PROMISE ERROR: ' + (e.reason && e.reason.message || e.reason);
    });
  </script>

  <script type="module">
    import * as THREE from 'three';
    // ??? Configuration ? edit these values to customise the effect ???????????????
    const CONFIG = {
      // Tunnel wireframe colour
      tunnelColor: '#0044ff',
      // Inner ring accent colour
      ringColor: '#00ffff',
      // How fast the camera flies through the tunnel
      flySpeed: 0.25,
      // How fast the tunnel rotates around its Z axis
      rotationSpeed: 0.0015,
      // How much the mouse steers the camera (0 = none, 1 = strong)
      mouseSteering: 0.04,
      // Tunnel radius ? larger = wider tunnel
      tunnelRadius: 3.5,
      // Number of rings inside the tunnel
      ringCount: 40,
      // Fog start distance
      fogNear: 30,
      // Fog end distance
      fogFar: 200,
    };
    const isMobile = /Mobi|Android/i.test(navigator.userAgent) || window.innerWidth < 768;
    const THEMES = {
      cyber:  { tunnel: new THREE.Color(CONFIG.tunnelColor), ring: new THREE.Color(CONFIG.ringColor), bg: 0x000000 },
      neon:   { tunnel: 0xff0088, ring: 0xffff00, bg: 0x05000a },
      matrix: { tunnel: 0x00ff41, ring: 0x00aa22, bg: 0x000a00 },
    };
    let currentTheme = THEMES.cyber;

    const canvas = document.getElementById('tunnel-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(currentTheme.bg, 1);

    const scene = new THREE.Scene();

    scene.fog = new THREE.Fog(currentTheme.bg, CONFIG.fogNear, CONFIG.fogFar);

    const camera = new THREE.PerspectiveCamera(
      90, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    camera.position.set(0, 0, 8);

    const path = new THREE.LineCurve3(
      new THREE.Vector3(0, 0, 10),
      new THREE.Vector3(0, 0, -500)
    );

    const tubeGeo = new THREE.TubeGeometry(
      path, (isMobile ? 400 : 800), CONFIG.tunnelRadius, (isMobile ? 6 : 8), false
    );
    const tunnelMat = new THREE.MeshBasicMaterial({
      color: currentTheme.tunnel,
      side: THREE.BackSide,
      wireframe: true,
      transparent: true,
      opacity: 0.6,
    });
    const tunnel = new THREE.Mesh(tubeGeo, tunnelMat);
    scene.add(tunnel);

    let innerTunnel = null;
    if (!isMobile) {
      const innerGeo = new THREE.TubeGeometry(path, (isMobile ? 400 : 800), 2.8, 4, false);
      const innerMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        side: THREE.BackSide,
        wireframe: true,
        transparent: true,
        opacity: 0.08,
      });
      innerTunnel = new THREE.Mesh(innerGeo, innerMat);
      scene.add(innerTunnel);
    }

    const rings = [];
    const ringGeo = new THREE.RingGeometry(3.2, 3.8, (isMobile ? 6 : 8));
    for (let i = 0; i < CONFIG.ringCount; i++) {
      const mat = new THREE.MeshBasicMaterial({
        color: currentTheme.ring,
        transparent: true,
        opacity: 0.35,
        side: THREE.DoubleSide,
      });
      const ring = new THREE.Mesh(ringGeo, mat);
      ring.position.z = -i * 12;
      ring.userData.originalZ = ring.position.z;
      scene.add(ring);
      rings.push(ring);
    }

    const streaks = [];
    function randRange(a, b) { return a + Math.random() * (b - a); }

    for (let i = 0; i < (isMobile ? 80 : 200); i++) {
      const len = randRange(0.8, 2.0);
      const x = randRange(-3, 3);
      const y = randRange(-2, 2);
      const z = randRange(camera.position.z - 5, camera.position.z - 60);

      const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(x, y, z),
        new THREE.Vector3(x, y, z - len),
      ]);
      const mat = new THREE.LineBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: randRange(0.3, 0.7),
      });
      const line = new THREE.Line(geo, mat);
      line.userData = {
        x, y, len,
        speedMul: randRange(1.2, 2.5),
      };
      scene.add(line);
      streaks.push(line);
    }

    function placeStreak(line, z) {
      const { x, y, len } = line.userData;
      const pos = line.geometry.attributes.position;
      pos.setXYZ(0, x, y, z);
      pos.setXYZ(1, x, y, z - len);
      pos.needsUpdate = true;
    }

    const mouse = { x: 0, y: 0 };
    window.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -((e.clientY / window.innerHeight) * 2 - 1);
    });

    window.addEventListener('touchmove', (e) => {
      if (!e.touches.length) return;
      const t = e.touches[0];
      mouse.x = (t.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -((t.clientY / window.innerHeight) * 2 - 1);
    }, { passive: true });

    const lerp = (a, b, t) => a + (b - a) * t;

    const tmpA = new THREE.Color();
    const tmpB = new THREE.Color();
    function lerpColor(material, targetHex, t) {
      tmpA.copy(material.color);
      tmpB.set(targetHex);
      material.color.copy(tmpA.lerp(tmpB, t));
    }

    let themeTarget = currentTheme;
    let themeBlend = 1;
    const fogColor = new THREE.Color(currentTheme.bg);

    document.querySelectorAll('.theme-switch button').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.theme-switch button')
          .forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        themeTarget = THEMES[btn.dataset.theme];
        themeBlend = 0;
      });
    });

    let time = 0;
    let speedBoost = 0;
    let lastBurst = 0;
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      time += dt;

      speedBoost *= 0.95;
      if (time - lastBurst > 8) {
        speedBoost = 0.6 - 0.25;
        lastBurst = time;
      }
      const flySpeed =
        CONFIG.flySpeed + Math.sin(time * 0.5) * 0.08 + speedBoost;

      camera.position.z -= flySpeed;
      if (camera.position.z < -480) {
        camera.position.z = 0;
      }

      const targetX = mouse.x * 1.8;
      const targetY = mouse.y * 1.0;
      camera.position.x = lerp(camera.position.x, targetX, CONFIG.mouseSteering);
      camera.position.y = lerp(camera.position.y, targetY, CONFIG.mouseSteering);

      camera.lookAt(
        camera.position.x * 0.3,
        camera.position.y * 0.3,
        camera.position.z - 20
      );

      tunnel.rotation.z += CONFIG.rotationSpeed + mouse.x * 0.0008;
      if (innerTunnel) {
        innerTunnel.rotation.z -= 0.001;
      }

      const recycleDist = CONFIG.ringCount * 12;
      for (const ring of rings) {
        if (ring.position.z > camera.position.z + 10) {
          ring.position.z -= recycleDist;
        }
      }

      for (const line of streaks) {
        const pos = line.geometry.attributes.position;
        const newZ0 = pos.getZ(0) + flySpeed * line.userData.speedMul;

        const z = newZ0;
        if (z > camera.position.z + 2) {
          placeStreak(line, camera.position.z - 60);
        } else {
          placeStreak(line, z);
        }
      }

      if (themeBlend < 1) {
        themeBlend = Math.min(1, themeBlend + dt);
        lerpColor(tunnelMat, themeTarget.tunnel, 0.08);
        for (const ring of rings) lerpColor(ring.material, themeTarget.ring, 0.08);
        fogColor.lerp(new THREE.Color(themeTarget.bg), 0.08);
        scene.fog.color.copy(fogColor);
        renderer.setClearColor(fogColor, 1);
        if (themeBlend >= 1) currentTheme = themeTarget;
      }

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
