<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Morphing Blob — Effect 03</title>

<!--
  ============================================================================
  MORPHING BLOB — Three.js Hero Background (Effect 03)
  ============================================================================
  A high-detail icosahedron whose surface is displaced by 3D simplex noise,
  giving a slow, organic, breathing "blob" of metallic material. Three coloured
  point lights orbit it (purple / cyan / pink) so the metal catches shifting
  highlights. Fog fades the far side into black for an atmospheric glow.

  ---------------------------------------------------------------------------
  CUSTOMISATION GUIDE (see the CONFIG block in the script below)
  ---------------------------------------------------------------------------
    • Blob COLOUR        → CONFIG.blobColor      (base material colour, hex)
    • Metal / matte look → CONFIG.metalness / CONFIG.roughness
    • Noise SPEED        → CONFIG.timeStep       (per-frame time increment)
    • Noise STRENGTH     → CONFIG.noiseStrength  (how far vertices push out, 0–1+)
    • Noise SCALE        → CONFIG.noiseScale     (spatial frequency of the lumps)
    • Light COLOURS      → CONFIG.light1 / light2 / light3 (hex)
    • Light INTENSITY    → set on each PointLight where created
  ============================================================================
-->

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /*
    The gradient must live on <html> — not <body>.
    CSS rule: if <html> has a non-transparent background it becomes the
    "viewport canvas" (the absolute bottom layer), painted before everything
    else, including fixed-positioned elements. Putting it on <body> instead
    paints the gradient OVER the canvas (z-index: -1), hiding Three.js.
  */
  html {
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #0d0221 0%, #000000 75%);
    overflow: hidden;
  }

  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent; /* must stay transparent so canvas shows through */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  #scene {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
    display: block;
  }

  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 1.5rem;
    pointer-events: none;
  }

  .hero h1 {
    color: #ffffff;
    font-size: clamp(2.2rem, 7vw, 5.5rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 1.2rem;
    text-shadow: 0 2px 50px rgba(124, 58, 237, 0.4);
  }

  .hero p {
    color: rgba(255, 255, 255, 0.7);
    font-size: clamp(0.95rem, 2.2vw, 1.3rem);
    font-weight: 400;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>

<main class="hero">
  <h1>Morphing Blob</h1>
  <p>Three.js Hero Background — Effect 03</p>
</main>

<!-- Three.js r158 + simplex-noise v4 via CDN import map -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
    "simplex-noise": "https://cdn.jsdelivr.net/npm/simplex-noise@4.0.1/dist/esm/simplex-noise.js"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { createNoise3D } from 'simplex-noise';

  // ---- CONFIG: tweak these to customise the effect ----
  const CONFIG = {
    blobColor:     0x7c3aed,  // base material colour
    metalness:     0.85,      // 1 = mirror-metal, 0 = dielectric
    roughness:     0.15,      // 0 = sharp reflections, 1 = matte
    timeStep:      0.004,     // noise animation speed
    noiseStrength: 0.45,      // displacement amount (scale = 1 + noise * strength)
    noiseScale:    0.35,      // spatial frequency of the lumps
    light1:        0x8b5cf6,  // purple orbiting light
    light2:        0x06b6d4,  // cyan counter-orbiting light
    light3:        0xec4899   // pink vertical light
  };

  const canvas = document.getElementById('scene');

  // ---- Renderer (alpha: true = transparent clear so CSS gradient shows through) ----
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);

  // ---- Scene & Camera ----
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x000000, 8, 20); // fade far side into black

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 6);
  camera.lookAt(0, 0, 0);

  // ---- Blob geometry ----
  // detail=64 → each of the 20 icosahedron faces subdivides into 65² = 4225 triangles
  // total ≈ 84 500 triangles / 253 500 vertices (non-indexed)
  const geometry = new THREE.IcosahedronGeometry(2.2, 64);

  // Snapshot the undeformed vertex positions — every frame's morph is computed
  // from these originals so the noise never accumulates / drifts.
  const origPositions = new Float32Array(geometry.attributes.position.array);

  const material = new THREE.MeshStandardMaterial({
    color:     CONFIG.blobColor,
    metalness: CONFIG.metalness,
    roughness: CONFIG.roughness,
    wireframe: false
  });

  const blob = new THREE.Mesh(geometry, material);
  scene.add(blob);

  // ---- Noise ----
  const noise3D = createNoise3D();

  // ---- Lighting ----
  const ambient = new THREE.AmbientLight(0x1a0a2e, 0.3);
  scene.add(ambient);

  const light1 = new THREE.PointLight(CONFIG.light1, 4, 12); // purple, orbits
  const light2 = new THREE.PointLight(CONFIG.light2, 4, 12); // cyan, counter-orbits
  const light3 = new THREE.PointLight(CONFIG.light3, 2, 8);  // pink, vertical sweep
  scene.add(light1, light2, light3);

  // ---- Mouse interaction ----
  const mouse = { x: 0, y: 0 };
  window.addEventListener('mousemove', (e) => {
    mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  });

  // ---- Animation loop ----
  let time = 0;
  let cameraAngle = 0;
  const pos = geometry.attributes.position;

  function animate() {
    requestAnimationFrame(animate);

    time += CONFIG.timeStep;

    // --- Morph the blob from its original (undeformed) positions ---
    for (let i = 0; i < pos.count; i++) {
      const ix = i * 3;
      const ox = origPositions[ix];
      const oy = origPositions[ix + 1];
      const oz = origPositions[ix + 2];

      const n = noise3D(
        ox * CONFIG.noiseScale + time,
        oy * CONFIG.noiseScale + time,
        oz * CONFIG.noiseScale
      );
      const scale = 1.0 + n * CONFIG.noiseStrength;

      pos.array[ix]     = ox * scale;
      pos.array[ix + 1] = oy * scale;
      pos.array[ix + 2] = oz * scale;
    }
    pos.needsUpdate = true;
    geometry.computeVertexNormals();

    // --- Orbiting lights ---
    light1.position.set( Math.sin(time * 0.7) * 5, Math.cos(time * 0.5) * 3,  2);
    light2.position.set(-Math.sin(time * 0.7) * 5, Math.cos(time * 0.8) * 3, -2);
    light3.position.set(0, Math.sin(time * 1.2) * 4, Math.cos(time) * 3);

    // --- Mouse rotation (lerped for smooth feel) ---
    blob.rotation.y += (mouse.x *  0.4 - blob.rotation.y) * 0.02;
    blob.rotation.x += (mouse.y * -0.2 - blob.rotation.x) * 0.02;

    // --- Slow camera auto-orbit around Y axis (radius 6) ---
    cameraAngle += 0.0004;
    camera.position.x = Math.sin(cameraAngle) * 6;
    camera.position.z = Math.cos(cameraAngle) * 6;
    camera.lookAt(0, 0, 0);

    renderer.render(scene, camera);
  }
  animate();

  // ---- Resize handling ----
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

</body>
</html>
