<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Black Hole — Three.js Hero Background (Effect 07)</title>
<style>
  /* ----------------------------------------------------------------------
     Pure-black cosmic canvas. The renderer fills the viewport and sits
     behind everything (z-index:-1) so this is usable as a hero background.
  ---------------------------------------------------------------------- */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: "Helvetica Neue", Arial, sans-serif;
  }

  /* IMPORTANT: the pure-black background lives on the ROOT element only.
     The canvas uses z-index:-1, which renders it BEHIND <body>. If <body>
     also had an opaque background it would paint over the canvas and you'd
     see nothing. Setting the background on <html> (the root) instead lets
     the negative-z-index canvas show through, while <body> stays
     transparent. */
  html { background: #000000; }     /* pure black void */
  body { background: transparent; }

  /* Fixed, full-viewport canvas living behind the page content. */
  #bg-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    display: block;
  }

  /* Demo overlay text — cosmic, wide letter-spacing, uppercase. */
  .overlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #ffffff;
    pointer-events: none;            /* let mouse reach the canvas */
    text-transform: uppercase;
    z-index: 1;
    user-select: none;
  }
  .overlay h1 {
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 200;
    letter-spacing: 0.3em;           /* "cosmic feel" */
    text-shadow: 0 0 30px rgba(204, 0, 255, 0.5),
                 0 0 60px rgba(255, 102, 0, 0.3);
  }
  .overlay p {
    margin-top: 1.5rem;
    font-size: clamp(0.7rem, 2vw, 1rem);
    font-weight: 300;
    letter-spacing: 0.3em;
    opacity: 0.75;
  }
</style>

<!-- ----------------------------------------------------------------------
     IMPORT MAP — load Three.js r158 from a CDN as an ES module. The
     import map lets us write `import * as THREE from 'three'` below.
----------------------------------------------------------------------- -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js"
  }
}
</script>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="overlay">
    <h1>Black Hole</h1>
    <p>Three.js Hero Background — Effect 07</p>
  </div>

<script type="module">
/* ======================================================================
   07 — BLACK HOLE :: gravitational lensing + particle vortex
   ======================================================================

   The scene is assembled from 5 layered components, drawn back-to-front:

     5. Background star field  (with gravitational-lensing distortion)
     3. Gravitational particle vortex (12,000 points spiralling inward)
     2. Accretion disk        (glowing shader ring, tilted toward viewer)
     4. Lensing ring          (the bright "Einstein ring")
     1. Event horizon         (the pure-black circle, drawn last, on top)

   --------------------------------------------------------------------
   CUSTOMISATION GUIDE (quick reference — details inline at each spot):
   --------------------------------------------------------------------
     • Black hole SIZE      → see CONFIG.eventHorizonRadius below. The
                              accretion disk inner radius and lensing ring
                              are derived from it, so one number scales the
                              whole core.
     • PARTICLE COUNT       → CONFIG.particleCount (auto-halved on mobile).
     • ORBIT SPEEDS         → CONFIG.orbitSpeedConst (Kepler constant) and
                              CONFIG.inwardDrift{Min,Max}.
     • ACCRETION COLOURS    → search "ACCRETION COLOURS" in the fragment
                              shader (uColInner / uColMid / uColOuter) and
                              the JS particle colour bands in updateParticles.
   ====================================================================== */

import * as THREE from 'three';
// simplex-noise v4 — loaded as requested. We use it to add organic jitter
// to the inward drift so the vortex doesn't look mechanically uniform.
import { createNoise2D } from 'https://cdn.jsdelivr.net/npm/simplex-noise@4.0.1/dist/esm/simplex-noise.js';

/* ----------------------------------------------------------------------
   DEVICE DETECTION + CONFIG
   On mobile we reduce particle counts and simplify the accretion disk to
   a cheap MeshBasicMaterial, and we skip per-frame colour updates.
---------------------------------------------------------------------- */
const IS_MOBILE = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i
                    .test(navigator.userAgent) || window.innerWidth < 768;

const CONFIG = {
  eventHorizonRadius: 1.2,                       // ← change to resize the black hole
  particleCount:      IS_MOBILE ? 5000 : 12000,  // ← total vortex particles
  starCount:          IS_MOBILE ? 1500 : 3000,
  orbitSpeedConst:    0.015,                      // ← Kepler constant (see below)
  inwardDriftMin:     0.0008,
  inwardDriftMax:     0.003,
};

const noise2D = createNoise2D();

/* ----------------------------------------------------------------------
   RENDERER / SCENE / CAMERA
---------------------------------------------------------------------- */
const canvas   = document.getElementById('bg-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: !IS_MOBILE, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, IS_MOBILE ? 1.5 : 2));
renderer.setClearColor(0x000000, 1);

const scene = new THREE.Scene();

// PerspectiveCamera fov 70 — starts up and back from the disk so we see
// its tilt. It slowly orbits (in the animation loop) to reveal the disk
// from changing angles.
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2.5, 9);

/* ======================================================================
   COMPONENT 1 — EVENT HORIZON  (the pure-black circle)
   ----------------------------------------------------------------------
   A flat black disk that always faces the camera (a "billboard"), drawn
   with renderOrder 10 so it is painted on top of every glowing element —
   guaranteeing the centre reads as a true black void. A barely-visible
   pulse makes it feel alive.
====================================================================== */
const eventHorizon = new THREE.Mesh(
  new THREE.CircleGeometry(CONFIG.eventHorizonRadius, 64),
  new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide })
);
eventHorizon.renderOrder = 10;
scene.add(eventHorizon);

/* ======================================================================
   COMPONENT 2 — ACCRETION DISK  (glowing ring of in-falling matter)
   ----------------------------------------------------------------------
   A RingGeometry tilted toward the viewer (rotation.x). On desktop it uses
   a custom ShaderMaterial producing a hot inner → yellow → purple gradient
   with rotating "hot spots". ADDITIVE BLENDING makes overlapping bright
   pixels accumulate, which is what produces the energetic glow look:
   instead of one layer hiding another, their colours sum toward white.
====================================================================== */
let accretionDisk, accretionUniforms = null;

const diskGeo = new THREE.RingGeometry(
  CONFIG.eventHorizonRadius * 1.04,   // inner radius (just outside horizon)
  3.5,                                // outer radius
  128, 8
);

if (!IS_MOBILE) {
  accretionUniforms = {
    uTime:  { value: 0 },
    uPulse: { value: 1 },             // driven by the "breathing" pulse
    // ACCRETION COLOURS — change these three to recolour the disk:
    uColInner: { value: new THREE.Color(0xff6600) }, // hot orange (inner)
    uColMid:   { value: new THREE.Color(0xffcc00) }, // yellow-white (middle)
    uColOuter: { value: new THREE.Color(0xcc00ff) }, // purple (outer, fades out)
  };

  const diskMat = new THREE.ShaderMaterial({
    uniforms: accretionUniforms,
    transparent: true,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending,           // ← the glow
    vertexShader: /* glsl */`
      varying vec2 vUv;
      void main() {
        vUv = uv;                                // pass UVs to fragment
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: /* glsl */`
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;
      uniform float uPulse;
      uniform vec3  uColInner;
      uniform vec3  uColMid;
      uniform vec3  uColOuter;

      void main() {
        // Polar coordinates from the centre of the UV square.
        // angle = direction around the disk; r = normalised distance out.
        float angle = atan(vUv.y - 0.5, vUv.x - 0.5);
        float r     = length(vUv - 0.5) * 2.0;   // 0 at centre → ~1 at edge

        // Colour gradient: inner→mid over r 0.0–0.5, mid→outer over 0.5–1.0.
        vec3 col = mix(uColInner, uColMid, smoothstep(0.0, 0.5, r));
        col      = mix(col, uColOuter, smoothstep(0.5, 1.0, r));

        // Brightness pulse swirling around the ring.
        float brightness = sin(angle * 3.0 + uTime * 2.0) * 0.3 + 0.7;

        // Rotating HOT SPOTS — bright patches that orbit the disk.
        float hot = pow(max(0.0, sin(angle * 6.0 + uTime * 3.0)), 4.0);
        brightness += hot * 0.6;

        // Opacity: solid near the inner edge, fading to 0 at the outer edge.
        float opacity = smoothstep(1.0, 0.3, r);

        // Fade out the very inner lip too so it blends into the horizon.
        opacity *= smoothstep(0.0, 0.15, r);

        col *= brightness * uPulse;              // breathing pulse
        gl_FragColor = vec4(col, opacity);
      }
    `,
  });

  accretionDisk = new THREE.Mesh(diskGeo, diskMat);
} else {
  // MOBILE: simplified accretion disk — a cheap additive vertex-coloured
  // ring (a "static texture" baked into vertex colours) instead of a shader.
  const colors = [];
  const pos = diskGeo.attributes.position;
  const cInner = new THREE.Color(0xff8800);
  const cOuter = new THREE.Color(0xcc00ff);
  for (let i = 0; i < pos.count; i++) {
    const d = Math.hypot(pos.getX(i), pos.getY(i));
    const t = THREE.MathUtils.clamp((d - diskGeo.parameters.innerRadius) /
              (diskGeo.parameters.outerRadius - diskGeo.parameters.innerRadius), 0, 1);
    const c = cInner.clone().lerp(cOuter, t);
    colors.push(c.r, c.g, c.b);
  }
  diskGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  accretionDisk = new THREE.Mesh(diskGeo, new THREE.MeshBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0.6,
    depthWrite: false, side: THREE.DoubleSide, blending: THREE.AdditiveBlending,
  }));
}
accretionDisk.rotation.x = Math.PI * 0.28;   // tilt toward viewer
scene.add(accretionDisk);

/* ======================================================================
   COMPONENT 4 — GRAVITATIONAL LENSING RING  (the "Einstein ring")
   ----------------------------------------------------------------------
   A thin bright ring hugging the event horizon. In reality this is light
   from behind the black hole bent around it. We fake it with a pulsing
   white↔blue additive ring that billboards toward the camera.
====================================================================== */
const lensUniforms = {
  uTime:    { value: 0 },
  uOpacity: { value: 0.7 },
};
const lensRing = new THREE.Mesh(
  new THREE.RingGeometry(
    CONFIG.eventHorizonRadius * 0.983,
    CONFIG.eventHorizonRadius * 1.125,
    128, 2
  ),
  new THREE.ShaderMaterial({
    uniforms: lensUniforms,
    transparent: true,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending,
    vertexShader: /* glsl */`
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: /* glsl */`
      precision highp float;
      varying vec2 vUv;
      uniform float uTime;
      uniform float uOpacity;
      void main() {
        float pulse = sin(uTime * 4.0) * 0.3 + 0.7;     // breathing glow
        vec3 white = vec3(1.0);
        vec3 blue  = vec3(0.533, 0.667, 1.0);            // #88aaff
        vec3 col   = mix(blue, white, pulse);
        gl_FragColor = vec4(col, uOpacity * pulse);
      }
    `,
  })
);
lensRing.renderOrder = 9;
scene.add(lensRing);

/* ======================================================================
   COMPONENT 3 — GRAVITATIONAL PARTICLE VORTEX
   ----------------------------------------------------------------------
   12,000 points (5,000 on mobile) representing matter spiralling into the
   black hole. Each particle is described in POLAR COORDINATES:

       x = cos(angle) * radius
       z = sin(angle) * radius

   Working in polar space makes spiral motion trivial: advancing `angle`
   each frame produces a circular orbit, and shrinking `radius` pulls the
   particle inward — together they trace a logarithmic spiral.

   KEPLER'S THIRD LAW (orbital mechanics): bodies closer to a mass orbit
   faster. Real orbital speed ∝ 1/√radius, so we set:

       orbitSpeed = orbitSpeedConst / sqrt(radius)

   giving inner particles a visibly faster sweep than outer ones — the
   same differential rotation that "winds up" real accretion disks.
====================================================================== */
const count = CONFIG.particleCount;

const positions = new Float32Array(count * 3);
const colors    = new Float32Array(count * 3);

// Per-particle simulation state (kept in plain typed arrays for speed
// rather than per-object userData on 12k objects).
const pAngle     = new Float32Array(count);
const pRadius    = new Float32Array(count);
const pOrbitSpd  = new Float32Array(count);
const pInDrift   = new Float32Array(count);  // current (animated) drift
const pBaseDrift = new Float32Array(count);  // resting drift to lerp back to
const pVertOff   = new Float32Array(count);
const pSize      = new Float32Array(count);  // (stored for reference/tuning)
const pBright    = new Float32Array(count);

const tmpColor = new THREE.Color();

// Colour a single particle by its radius (hot near the centre, cold far out).
function colorForRadius(r, brightness, i) {
  if      (r < 2.0) tmpColor.set(0xffffff);   // white hot, near horizon
  else if (r < 3.5) tmpColor.set(0xff8800);   // orange, hot accretion zone
  else if (r < 5.5) tmpColor.set(0xcc44ff);   // purple, outer zone
  else              tmpColor.set(0x334466);   // dark blue, cold outskirts
  colors[i*3+0] = tmpColor.r * brightness;
  colors[i*3+1] = tmpColor.g * brightness;
  colors[i*3+2] = tmpColor.b * brightness;
}

// Initialise one particle (also used when recycling past the horizon).
function spawnParticle(i, freshOuter = false) {
  const radius = freshOuter
      ? 6 + Math.random() * 3                  // recycle to outer edge
      : 2.5 + Math.pow(Math.random(), 0.6) * 6.5; // bias toward outer edges
  pAngle[i]     = Math.random() * Math.PI * 2;
  pRadius[i]    = radius;
  pOrbitSpd[i]  = CONFIG.orbitSpeedConst / Math.sqrt(radius); // Kepler
  const drift   = CONFIG.inwardDriftMin +
                  Math.random() * (CONFIG.inwardDriftMax - CONFIG.inwardDriftMin);
  pBaseDrift[i] = drift;
  pInDrift[i]   = drift;
  pVertOff[i]   = (Math.random() - 0.5) * 0.8;  // -0.4 .. 0.4
  pSize[i]      = 0.008 + Math.random() * 0.017; // 0.008 .. 0.025
  pBright[i]    = 0.4 + Math.random() * 0.6;     // 0.4 .. 1.0
}

for (let i = 0; i < count; i++) {
  spawnParticle(i);
  colorForRadius(pRadius[i], pBright[i], i);
}

const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

const particleMat = new THREE.PointsMaterial({
  size: 0.05,
  vertexColors:    true,
  sizeAttenuation: true,    // smaller when farther from camera
  transparent:     true,
  depthWrite:      false,
  blending:        THREE.AdditiveBlending,   // ← CRITICAL for the energy glow
  opacity:         0.9,
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

/* ======================================================================
   COMPONENT 5 — BACKGROUND STAR FIELD  (with lensing distortion)
   ----------------------------------------------------------------------
   3,000 stars on a thick spherical shell (radius 20–40). Stars whose
   projected position lands near the black hole are pushed outward to fake
   GRAVITATIONAL LENSING: light from a distant star passing close to the
   mass is bent, so the star appears shifted away from the centre. We
   approximate this with:

       distortion = (starPos / dist) * (1.5 / dist)

   i.e. a radial nudge that grows as the star sits nearer the centre.
====================================================================== */
const starCount = CONFIG.starCount;
const starPos   = new Float32Array(starCount * 3);

for (let i = 0; i < starCount; i++) {
  // Random direction on the unit sphere, random radius in [20,40].
  const u = Math.random(), v = Math.random();
  const theta = u * Math.PI * 2;
  const phi   = Math.acos(2 * v - 1);
  const radius = 20 + Math.random() * 20;

  let x = radius * Math.sin(phi) * Math.cos(theta);
  let y = radius * Math.sin(phi) * Math.sin(theta);
  let z = radius * Math.cos(phi);

  // Lensing distortion for stars projected near the centre (xy distance).
  const dist = Math.hypot(x, y);
  if (dist < 6 && dist > 0.001) {
    x += (x / dist) * (1.5 / dist);   // bend away from centre
    y += (y / dist) * (1.5 / dist);
  }

  starPos[i*3+0] = x;
  starPos[i*3+1] = y;
  starPos[i*3+2] = z;
}

const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starField = new THREE.Points(starGeo, new THREE.PointsMaterial({
  size: 0.012,
  color: 0xffffff,
  transparent: true,
  opacity: 0.6,
  sizeAttenuation: true,
}));
scene.add(starField);

/* ======================================================================
   MOUSE — "feeding" the black hole
   ----------------------------------------------------------------------
   We unproject the mouse onto the y=0 plane to get its world position.
   Particles roughly in the mouse's angular direction get a temporarily
   boosted inward drift (×1.5), so dragging the cursor near the core makes
   matter rush in. When the mouse leaves, each particle's drift lerps back
   to its resting value over ~1 second.
====================================================================== */
const mouseNDC   = new THREE.Vector2(999, 999); // start "off screen"
const mouseWorld = new THREE.Vector3();
const raycaster  = new THREE.Raycaster();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
let mouseActive = false;

window.addEventListener('pointermove', (e) => {
  mouseNDC.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
  mouseActive = true;
});
window.addEventListener('pointerleave', () => { mouseActive = false; });

/* ----------------------------------------------------------------------
   PER-FRAME PARTICLE UPDATE
---------------------------------------------------------------------- */
let frameNo = 0;

function updateParticles(time, dt) {
  // On mobile, refresh vertex colours only every 3rd frame (perf).
  const doColors = !IS_MOBILE || (frameNo % 3 === 0);

  // Mouse angle (for directional "feeding"), if active and near the core.
  let mouseFeeding = false;
  let mouseAngle = 0;
  if (mouseActive) {
    raycaster.setFromCamera(mouseNDC, camera);
    if (raycaster.ray.intersectPlane(groundPlane, mouseWorld)) {
      const md = Math.hypot(mouseWorld.x, mouseWorld.z);
      if (md < 5) {
        mouseFeeding = true;
        mouseAngle = Math.atan2(mouseWorld.z, mouseWorld.x);
      }
    }
  }

  // How fast drift lerps back to rest (~1 second time constant).
  const lerpBack = Math.min(1, dt / 1.0);

  for (let i = 0; i < count; i++) {
    // Target drift = base, boosted ×1.5 if the mouse is feeding this
    // particle's direction.
    let targetDrift = pBaseDrift[i];
    if (mouseFeeding) {
      // Angular closeness to the mouse direction (1 = aligned).
      const align = Math.cos(pAngle[i] - mouseAngle) * 0.5 + 0.5;
      if (align > 0.6) targetDrift = pBaseDrift[i] * 1.5;
    }
    // Lerp current drift toward target (instant boost feels snappy; the
    // return path uses the ~1s lerp).
    pInDrift[i] += (targetDrift - pInDrift[i]) * (mouseFeeding ? 0.2 : lerpBack);

    // --- advance the orbit (polar) ---
    pAngle[i]  += pOrbitSpd[i];
    // Organic jitter on the inward pull via simplex noise.
    const jitter = noise2D(i * 0.01, time * 0.1) * 0.0004;
    pRadius[i] -= (pInDrift[i] + jitter);

    // Crossed the event horizon → recycle to the outer edge.
    if (pRadius[i] < CONFIG.eventHorizonRadius) {
      spawnParticle(i, true);
      if (doColors) colorForRadius(pRadius[i], pBright[i], i);
    }

    const r = pRadius[i];
    const a = pAngle[i];

    // Polar → Cartesian. y is flattened into a thin disk with slight
    // thickness from the per-particle vertical offset.
    positions[i*3+0] = Math.cos(a) * r;
    positions[i*3+1] = Math.sin(pVertOff[i] * r * 0.1) * 0.3;
    positions[i*3+2] = Math.sin(a) * r;

    if (doColors) colorForRadius(r, pBright[i], i);
  }

  particleGeo.attributes.position.needsUpdate = true;
  if (doColors) particleGeo.attributes.color.needsUpdate = true;
}

/* ----------------------------------------------------------------------
   ANIMATION LOOP
---------------------------------------------------------------------- */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt   = Math.min(clock.getDelta(), 0.05);  // clamp big tab-switch gaps
  const time = clock.getElapsedTime();
  frameNo++;

  // "Audio-reactive" idle pulse — the whole core breathes. No real audio;
  // a simple oscillator drives several uniforms in sync.
  const pulse = Math.abs(Math.sin(time * 1.8)) * 0.3 + 0.7;

  // --- COMPONENT 1: event horizon ---
  eventHorizon.lookAt(camera.position);                       // billboard
  const ehScale = 1.0 + Math.sin(time * 1.5) * 0.015;         // subtle throb
  eventHorizon.scale.setScalar(ehScale);

  // --- COMPONENT 2: accretion disk ---
  if (accretionUniforms) {
    accretionUniforms.uTime.value  = time;
    accretionUniforms.uPulse.value = pulse;                   // breathing
  }

  // --- COMPONENT 4: lensing ring ---
  lensUniforms.uTime.value    = time;
  lensUniforms.uOpacity.value = 0.7 * pulse;                  // breathing opacity
  lensRing.lookAt(camera.position);                           // billboard

  // --- COMPONENT 3: particle vortex ---
  updateParticles(time, dt);

  // --- COMPONENT 5: star field slow spin ---
  starField.rotation.y += 0.00008;

  // --- CAMERA: slow wide orbit, always looking at the core ---
  camera.position.x = Math.sin(time * 0.07) * 1.5;
  camera.position.y = 2.5 + Math.cos(time * 0.05) * 0.8;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
animate();

/* ----------------------------------------------------------------------
   RESIZE
---------------------------------------------------------------------- */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
