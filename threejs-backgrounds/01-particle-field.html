<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interactive Particle Field — Product 01</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    /* Keep this transparent: the canvas lives at z-index:-1 (behind the body),
       so an opaque body background would paint over and hide the particles.
       The deep color comes from the renderer/canvas clear color instead. */
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  /* Full viewport canvas sits behind all content */
  #scene {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
    display: block;
  }

  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 1.5rem;
    pointer-events: none; /* let canvas-area mouse moves through, button re-enables below */
  }

  .hero h1 {
    color: #ffffff;
    font-size: clamp(2.2rem, 7vw, 5.5rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 1.2rem;
    text-shadow: 0 2px 40px rgba(126, 184, 247, 0.25);
  }

  .hero p {
    color: rgba(255, 255, 255, 0.7);
    font-size: clamp(0.95rem, 2.2vw, 1.3rem);
    font-weight: 400;
    letter-spacing: 0.02em;
    margin-bottom: 2.4rem;
  }

  .cta {
    pointer-events: auto;
    display: inline-block;
    color: #ffffff;
    background: transparent;
    border: 1.5px solid rgba(255, 255, 255, 0.85);
    border-radius: 999px;
    padding: 0.85rem 2.4rem;
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.03em;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.25s ease, color 0.25s ease, transform 0.15s ease;
  }

  .cta:hover {
    background: #ffffff;
    color: #050510;
    transform: translateY(-2px);
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>

<main class="hero">
  <h1>Interactive Particle Field</h1>
  <p>Three.js Hero Background — Product 01</p>
  <a href="#" class="cta">Get Started</a>
</main>

<!-- Three.js r158 via CDN import map -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';

  const canvas = document.getElementById('scene');

  // ---- Renderer ----
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x050510, 1);

  // ---- Scene & Camera ----
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050510);

  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.z = 4;

  // ---- Circular alphaMap texture (offscreen canvas) ----
  function makeCircleTexture() {
    const size = 64;
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    // Radial gradient: solid white centre fading to transparent edge (blurred edges)
    const grad = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
    grad.addColorStop(0.0, 'rgba(255,255,255,1)');
    grad.addColorStop(0.4, 'rgba(255,255,255,1)');
    grad.addColorStop(1.0, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
    ctx.fill();
    const tex = new THREE.CanvasTexture(c);
    tex.needsUpdate = true;
    return tex;
  }

  // ---- Particle system ----
  const PARTICLE_COUNT = 6000;
  const positions = new Float32Array(PARTICLE_COUNT * 3);
  const origPositions = new Float32Array(PARTICLE_COUNT * 3); // store originals for elastic return

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const ix = i * 3;
    const x = (Math.random() * 2 - 1) * 6;  // -6 .. 6
    const y = (Math.random() * 2 - 1) * 6;  // -6 .. 6
    const z = (Math.random() * 2 - 1) * 2;  // -2 .. 2
    positions[ix]     = x;
    positions[ix + 1] = y;
    positions[ix + 2] = z;
    origPositions[ix]     = x;
    origPositions[ix + 1] = y;
    origPositions[ix + 2] = z;
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const material = new THREE.PointsMaterial({
    size: 0.025,
    color: 0x7eb8f7,
    transparent: true,
    opacity: 0.85,
    alphaMap: makeCircleTexture(),
    depthWrite: false,
    blending: THREE.AdditiveBlending
  });

  const points = new THREE.Points(geometry, material);
  scene.add(points);

  // ---- Mouse tracking (normalised device coordinates) ----
  const mouse = new THREE.Vector2(0, 0);
  // Detect mobile once; Disable mouse interaction on mobile for performance
  const isMobile = window.innerWidth < 768;

  if (!isMobile) {
    window.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });
  }

  // Map NDC mouse to approximate world-space coordinates at the particle plane.
  // The particle field spans roughly -6..6, so scale NDC accordingly.
  const MOUSE_WORLD_SCALE = 6;
  const INFLUENCE_RADIUS = 1.8;
  const LERP_SPEED = 0.04;

  // ---- Animation loop ----
  function animate() {
    requestAnimationFrame(animate);

    // Slow overall rotation of the field
    points.rotation.y += 0.0003;

    const posAttr = geometry.attributes.position;
    const arr = posAttr.array;

    if (!isMobile) {
      const mx = mouse.x * MOUSE_WORLD_SCALE;
      const my = mouse.y * MOUSE_WORLD_SCALE;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const ix = i * 3;
        const px = arr[ix];
        const py = arr[ix + 1];

        // Distance from mouse in world space (x/y plane)
        const dx = px - mx;
        const dy = py - my;
        const dist = Math.sqrt(dx * dx + dy * dy);

        // Repulsion within influence radius
        if (dist < INFLUENCE_RADIUS && dist > 0.0001) {
          const force = (1 - dist / INFLUENCE_RADIUS) * 0.6;
          arr[ix]     += (dx / dist) * force;
          arr[ix + 1] += (dy / dist) * force;
        }

        // Always elastic-lerp back toward original position
        arr[ix]     += (origPositions[ix]     - arr[ix])     * LERP_SPEED;
        arr[ix + 1] += (origPositions[ix + 1] - arr[ix + 1]) * LERP_SPEED;
        arr[ix + 2] += (origPositions[ix + 2] - arr[ix + 2]) * LERP_SPEED;
      }
      posAttr.needsUpdate = true;
    }
    // On mobile we skip the repulsion loop entirely — only the slow rotation runs.

    renderer.render(scene, camera);
  }
  animate();

  // ---- Resize handling ----
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

</body>
</html>
