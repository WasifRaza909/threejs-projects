<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy Spiral — Three.js Background 04</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000005;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: -1;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      color: #fff;
      text-align: center;
    }

    .overlay h1 {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 200;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .overlay p {
      margin-top: 1rem;
      font-size: clamp(0.8rem, 2vw, 1.1rem);
      letter-spacing: 0.15em;
      opacity: 0.6;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="overlay">
    <h1>Galaxy Spiral</h1>
    <p>Three.js Hero Background — Effect 04</p>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ─── TUNABLE PARAMETERS ─────────────────────────────────────────────────────
    // Change PARTICLE_COUNT for density vs. performance trade-off.
    const PARTICLE_COUNT = 80_000;

    // Change ARMS to get a different galaxy shape (2 = classic Milky Way, 3–5 = exotic).
    const ARMS = 2;

    // RADIUS controls how far particles spread from the centre (world units).
    const RADIUS = 7;

    // SPIN_FACTOR: higher values = tighter, more wound arms.
    const SPIN_FACTOR = 1.4;

    // SPREAD: how loosely particles scatter away from each arm's centreline.
    const SPREAD = 0.45;

    // ROTATION_SPEED: radians per frame. Lower = more realistic, higher = dramatic.
    const ROTATION_SPEED = 0.00025;

    // innerColor: core colour (warm yellow-white). outerColor: edge colour (deep blue-purple).
    const innerColor = new THREE.Color('#ffdd88');
    const outerColor = new THREE.Color('#3322ff');
    // ─────────────────────────────────────────────────────────────────────────────

    // Scene
    const scene = new THREE.Scene();

    // Camera
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 7);
    camera.lookAt(0, 0, 0);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // ─── BUILD GALAXY ────────────────────────────────────────────────────────────
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors    = new Float32Array(PARTICLE_COUNT * 3);

    const colorLerp = new THREE.Color();

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const i3 = i * 3;

      // Power curve: concentrates particles toward the centre.
      const r = Math.pow(Math.random(), 1.5) * RADIUS;

      // Which arm this particle belongs to.
      const armAngle  = (i % ARMS) / ARMS * Math.PI * 2;

      // Outer particles rotate more = spiral arms wind outward.
      const spinAngle = r * SPIN_FACTOR;

      const angle = armAngle + spinAngle;

      // Cube power = tight core, loose wispy edges.
      const randomSpread = Math.pow(Math.random(), 3) * SPREAD;
      const randomX = (Math.random() - 0.5) * 2;
      const randomZ = (Math.random() - 0.5) * 2;
      const randomY = (Math.random() - 0.5) * 2;

      positions[i3    ] = Math.cos(angle) * r + randomX * randomSpread;
      // Thin disk: vertical scatter scales with radius and spread.
      positions[i3 + 1] = randomY * 0.25 * r * randomSpread;
      positions[i3 + 2] = Math.sin(angle) * r + randomZ * randomSpread;

      // Colour: lerp from innerColor (core) to outerColor (edges).
      colorLerp.lerpColors(innerColor, outerColor, r / RADIUS);

      // Slight per-particle variation so the galaxy doesn't look flat.
      colors[i3    ] = THREE.MathUtils.clamp(colorLerp.r + (Math.random() - 0.5) * 0.1, 0, 1);
      colors[i3 + 1] = THREE.MathUtils.clamp(colorLerp.g + (Math.random() - 0.5) * 0.1, 0, 1);
      colors[i3 + 2] = THREE.MathUtils.clamp(colorLerp.b + (Math.random() - 0.5) * 0.1, 0, 1);
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color',    new THREE.BufferAttribute(colors,    3));

    // AdditiveBlending is the key to the glow / nebula look:
    // overlapping particles ADD their light together instead of covering each other,
    // creating bright cores and soft glowing halos automatically.
    const material = new THREE.PointsMaterial({
      size:           0.008,
      vertexColors:   true,
      sizeAttenuation: true,
      transparent:    true,
      depthWrite:     false,
      blending:       THREE.AdditiveBlending,
    });

    const galaxy = new THREE.Points(geometry, material);
    scene.add(galaxy);
    // ─────────────────────────────────────────────────────────────────────────────

    // ─── MOUSE TRACKING ──────────────────────────────────────────────────────────
    const mouse = { x: 0, y: 0 };
    const cameraTarget = { x: camera.position.x, y: camera.position.y };

    window.addEventListener('mousemove', (e) => {
      // Normalise to [-1, 1]
      mouse.x = (e.clientX / window.innerWidth  - 0.5) * 2;
      mouse.y = (e.clientY / window.innerHeight - 0.5) * 2;
    });
    // ─────────────────────────────────────────────────────────────────────────────

    // ─── ANIMATION LOOP ──────────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();

      // Slow galaxy rotation — realistic spiral galaxy drift.
      galaxy.rotation.y += ROTATION_SPEED;

      // Gentle vertical camera bob gives a sense of drifting through space.
      const baseY = 3 + Math.sin(elapsed * 0.3) * 0.8;

      // Smooth mouse influence (factor 0.01 = very subtle parallax).
      cameraTarget.x += (mouse.x * 0.6 - cameraTarget.x) * 0.01;
      cameraTarget.y += (-mouse.y * 0.4 - (cameraTarget.y - baseY)) * 0.01;

      camera.position.x = cameraTarget.x;
      camera.position.y = baseY + (cameraTarget.y - baseY);
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    animate();
    // ─────────────────────────────────────────────────────────────────────────────

    // ─── RESIZE ──────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
    // ─────────────────────────────────────────────────────────────────────────────
  </script>
</body>
</html>
