<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Threejs Soccer</title>
  </head>
  <body>

    <!-- ===== LOADER ===== -->
    <div id="loader">
      <svg class="loader-field-lines" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice">
        <rect x="40" y="40" width="920" height="520" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
        <line x1="40" y1="300" x2="960" y2="300" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
        <circle cx="500" cy="300" r="80" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
        <circle cx="500" cy="300" r="5" fill="rgba(255,255,255,0.12)"/>
        <rect x="40" y="188" width="160" height="224" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
        <rect x="40" y="240" width="58" height="120" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
        <rect x="800" y="188" width="160" height="224" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
        <rect x="902" y="240" width="58" height="120" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
        <circle cx="152" cy="300" r="4" fill="rgba(255,255,255,0.1)"/>
        <circle cx="848" cy="300" r="4" fill="rgba(255,255,255,0.1)"/>
        <path d="M200,232 A80,80 0 0 1 200,368" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
        <path d="M800,232 A80,80 0 0 0 800,368" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
        <path d="M40,60 A22,22 0 0 1 62,40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
        <path d="M938,40 A22,22 0 0 1 960,62" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
        <path d="M40,540 A22,22 0 0 0 62,560" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
        <path d="M938,560 A22,22 0 0 0 960,540" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
      </svg>

      <div class="loader-inner">
        <div class="loader-ball-wrap">
          <div class="loader-ball-bouncer">
            <span class="loader-ball">&#x26BD;</span>
          </div>
          <div class="loader-ball-shadow"></div>
        </div>

        <h1 class="loader-title">SOCCER ARENA</h1>
        <p class="loader-subtitle">Preparing your match</p>

        <div class="loader-scoreboard">
          <div class="loader-scoreboard-header">
            <span class="loader-score-label">MATCH STATUS</span>
          </div>
          <div class="loader-progress-row">
            <div class="loader-progress-track">
              <div class="loader-progress-fill" id="progress-fill"></div>
            </div>
            <span class="loader-progress-pct" id="progress-pct">0%</span>
          </div>
          <div class="loader-status" id="progress-status">Initializing physics engine...</div>
        </div>
      </div>
    </div>
    <!-- ===== /LOADER ===== -->

    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
